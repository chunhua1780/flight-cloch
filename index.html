<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Life OS v12</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:-apple-system;
    overflow:hidden;
}

/* ================= LAYOUT ================= */
#top{
    height:25vh;
    display:none;
    border-bottom:1px solid #222;
    padding:2vh;
    box-sizing:border-box;
}

#main{
    height:100vh;
    display:flex;
}

/* ================= SPLIT ================= */
.half{
    width:50%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* ================= CLOCK ================= */
.clock{
    font-size:18vh;
    font-weight:900;
}

.small{
    font-size:3vh;
    color:#aaa;
}

/* ================= WEATHER ================= */
.wx{
    position:absolute;
    top:20px;
    right:20px;
    text-align:right;
}

.wxIcon{
    font-size:8vh;
}

.wxTemp{
    font-size:4vh;
}

/* ================= TOP BAR ================= */
#topBar{
    font-size:2.5vh;
    color:#c1a35f;
}

/* ================= MODES ================= */
.mode0 #main{flex-direction:column;}
.mode1 #top{display:block;}
.mode2 #top{display:block;}
.mode3 #top{display:block;}
.mode4 #top{display:block;}
</style>
</head>

<body>

<div id="top">

    <div id="topBar">SYSTEM</div>

</div>

<div id="main">

    <!-- LEFT -->
    <div class="half">
        <div class="clock" id="leftClock">00:00</div>
        <div class="small" id="leftInfo"></div>
    </div>

    <!-- RIGHT -->
    <div class="half">
        <div class="clock" id="rightClock">00:00</div>
        <div class="small" id="rightInfo"></div>
    </div>

</div>

<!-- WEATHER -->
<div class="wx">
    <div class="wxIcon" id="wxIcon">☀️</div>
    <div class="wxTemp" id="wxTemp">--°</div>
</div>

<script>

/* ================= DATA ================= */
const GAS_URL="https://script.google.com/macros/s/AKfycbxSmqqVM38ZuCrrzwcm1E7179zwvAi5qjhEzaq4mXhwCOeczDP8CB2Nx7hw7zAFcqWU/exec";

/* ================= TIME ================= */
function fmt(d){
    return d.getHours().toString().padStart(2,"0")+":"+
           d.getMinutes().toString().padStart(2,"0");
}

/* ================= MODE ================= */
let mode=0;

/* ================= WEATHER ICON ================= */
function wx(c){
    if(c<=1) return "☀️";
    if(c<=3) return "🌤️";
    if(c<=6) return "☁️";
    if(c>=51) return "🌧️";
    return "🌡️";
}

/* ================= MAIN ================= */
async function update(){

    const now=new Date();

    const f=await fetch(GAS_URL).then(r=>r.json()).catch(()=>null);

    const noFlight=!f?.hasFlight;

    /* ================= MODE SELECT ================= */
    if(noFlight){
        mode=0;
    }else{
        const dep=new Date(f.std);
        const diff=(dep-now)/3600000;

        if(diff>2) mode=1;
        else if(diff<=2 && diff>0) mode=2;
        else mode=3;
    }

    document.body.className="mode"+mode;

    /* ================= MODE 0 ================= */
    if(mode===0){

        document.getElementById("leftClock").innerText=fmt(now);
        document.getElementById("rightClock").innerText="";

        document.getElementById("leftInfo").innerText=
            "Dubai · "+now.toDateString();

        document.getElementById("rightInfo").innerText="";

        document.getElementById("wxTemp").innerText="28°";
        document.getElementById("wxIcon").innerText="☀️";
    }

    /* ================= MODE 1 ================= */
    if(mode===1){

        document.getElementById("topBar").innerText=
            "UPCOMING FLIGHT";

        document.getElementById("leftClock").innerText=fmt(now);
        document.getElementById("rightClock").innerText=fmt(now);

        document.getElementById("leftInfo").innerText=
            "DXB · Dubai";

        document.getElementById("rightInfo").innerText=
            "DEST · "+(f.dest||"--");
    }

    /* ================= MODE 2 ================= */
    if(mode===2){

        document.getElementById("topBar").innerText=
            "READY FOR DEPARTURE";

    }

    /* ================= MODE 3 ================= */
    if(mode===3){

        document.getElementById("topBar").innerText=
            "ACTIVE FLIGHT / IN AIR";
    }
}

/* ================= LOOP ================= */
update();
setInterval(update,30000);

</script>

</body>
</html>
