<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>777 Captain Dashboard v4</title>

<style>
:root{
    --bg:#000;
    --gold:#c1a35f;
    --text:#fff;
    --gray:#1a1a1a;
    --green:#34c759;
    --red:#ff3b30;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, sans-serif;
    overflow:hidden;
    height:100vh;
}

/* ================= MODES ================= */

#hud{
    height:26vh;
    display:none;
    padding:1.5vh 2vw;
    background:#050505;
    border-bottom:2px solid #1a1a1a;
}

.dual #hud{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
}

/* MAIN */
#main{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.dual #main{
    height:74vh;
}

#clock{
    font-size:52vh;
    font-weight:900;
}

.dual #clock{
    font-size:30vh;
}

/* HUD blocks */
.box{
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.title{
    font-size:12px;
    color:#777;
}

.val{
    font-size:3.5vh;
    color:var(--gold);
    font-weight:800;
}

/* Weather */
.weatherIcon{
    font-size:8vh;
    color:var(--gold);
}

/* overlay switch */
#touch{
    position:absolute;
    width:100%;
    height:100%;
    z-index:999;
}

/* screensaver */
.saver #hud{opacity:0;}
.saver #clock{font-size:60vh;}
</style>
</head>

<body>

<div id="hud">

    <div class="box">
        <div class="title">FLIGHT</div>
        <div id="flightNo" class="val">--</div>
        <div id="pickup" style="font-size:2vh;color:#aaa;">--</div>
    </div>

    <div class="box" style="text-align:center;">
        <div id="wxIcon" class="weatherIcon">☀️</div>
        <div id="wxTemp" class="val">--°</div>
    </div>

    <div class="box" style="text-align:right;">
        <div class="title">STATUS</div>
        <div id="status">READY</div>
    </div>

</div>

<div id="main">

    <div id="clock">00:00</div>

    <div style="position:absolute;top:10px;left:10px;">
        <div id="date"></div>
    </div>

    <div style="position:absolute;top:10px;right:10px;text-align:right;">
        <div id="dxbIcon" style="font-size:8vh;">☀️</div>
        <div id="dxbTemp">--</div>
    </div>

</div>

<div id="touch" onclick="toggleMode()"></div>

<script>

// ================= CONFIG =================
const GAS_URL="https://script.google.com/macros/s/AKfycbxSmqqVM38ZuCrrzwcm1E7179zwvAi5qjhEzaq4mXhwCOeczDP8CB2Nx7hw7zAFcqWU/exec";

// ================= STATE =================
let mode="SINGLE";
let lastTouch=Date.now();

// ================= WEATHER ICON =================
function wx(code){
    if(code===0)return"☀️";
    if(code<=2)return"🌤️";
    if(code<=3)return"☁️";
    if(code>=51&&code<=67)return"🌧️";
    if(code>=71&&code<=77)return"🌨️";
    if(code>=80&&code<=82)return"🌦️";
    if(code>=95)return"⛈️";
    return"🌡️";
}

// ================= MODE =================
function toggleMode(){
    mode=(mode==="SINGLE")?"DUAL":"SINGLE";
    applyMode();
    lastTouch=Date.now();
}

function applyMode(){
    document.body.classList.toggle("dual",mode==="DUAL");
}

// ================= SAFE FETCH =================
async function get(url){
    try{return await (await fetch(url)).json();}
    catch(e){return null;}
}

// ================= UPDATE =================
async function update(){

    const now=new Date();

    document.getElementById("clock").innerText=
        now.getHours().toString().padStart(2,"0")+":"+
        now.getMinutes().toString().padStart(2,"0");

    document.getElementById("date").innerText=
        now.toDateString();

    // WEATHER DXB
    const w=await get("https://api.open-meteo.com/v1/forecast?latitude=25.25&longitude=55.36&current_weather=true");

    if(w?.current_weather){
        document.getElementById("dxbTemp").innerText=
            Math.round(w.current_weather.temperature)+"°";

        document.getElementById("dxbIcon").innerText=
            wx(w.current_weather.weathercode);
    }

    // FLIGHT
    const f=await get(GAS_URL);

    if(f?.hasFlight){
        document.getElementById("flightNo").innerText="EK "+(f.flightNo||"--");
        document.getElementById("status").innerText="FLIGHT ACTIVE";
    }else{
        document.getElementById("status").innerText="GROUND";
    }
}

// ================= SCREENSAVER =================
setInterval(()=>{
    if(Date.now()-lastTouch>60000){
        document.body.classList.add("saver");
    }else{
        document.body.classList.remove("saver");
    }
},5000);

// ================= START =================
applyMode();
update();
setInterval(update,30000);

</script>

</body>
</html>
