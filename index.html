<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFB v9 - Airline Dispatch System</title>

<style>
:root{
    --bg:#000;
    --gold:#c1a35f;
    --green:#34c759;
    --red:#ff3b30;
    --gray:#222;
}

body{
    margin:0;
    background:var(--bg);
    color:#fff;
    font-family:-apple-system;
    overflow:hidden;
}

/* ================= LAYOUT ================= */
#hud{
    height:26vh;
    display:none;
    grid-template-columns:1fr 1fr 1fr;
    padding:2vh;
    background:#050505;
    border-bottom:1px solid var(--gray);
}

.dual #hud{display:grid;}

#main{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.dual #main{height:74vh;}

#clock{
    font-size:52vh;
    font-weight:900;
}

.dual #clock{font-size:30vh;}

#date{
    font-size:4vh;
    color:#aaa;
    text-align:center;
}

/* ================= HUD ================= */
.box{display:flex;flex-direction:column;}
.val{font-size:4vh;color:var(--gold);font-weight:800;}
.small{font-size:2vh;color:#aaa;}

#phase{
    font-size:2vh;
    color:var(--green);
}

/* ================= PROGRESS ================= */
#bar{
    position:absolute;
    bottom:30px;
    left:10%;
    width:80%;
    height:4px;
    background:#222;
}

#plane{
    position:absolute;
    top:-10px;
    transition:left 1s linear;
}

/* ================= SCREEN ================= */
.saver #hud{opacity:0;}
.saver #clock{font-size:60vh;}
</style>
</head>

<body>

<div id="hud">

    <div class="box">
        <div>FLIGHT OPS</div>
        <div id="flightNo" class="val">--</div>
        <div id="phase">--</div>
    </div>

    <div class="box" style="text-align:center;">
        <div id="eta" class="val">--</div>
        <div class="small">ETA (REAL CALC)</div>
    </div>

    <div class="box" style="text-align:right;">
        <div id="status">READY</div>
        <div id="distance" class="small">-- NM</div>
        <div id="wind" class="small">-- KT</div>
    </div>

</div>

<div id="main">

    <div>
        <div id="clock">00:00</div>
        <div id="date"></div>
    </div>

    <div id="bar">
        <div id="plane">✈️</div>
    </div>

</div>

<script>

/* ================= CORE OPS ENGINE ================= */
const OPS = {

    flight:null,

    set(f){ this.flight=f; },

    dep(){ return new Date(this.flight.std); },

    // v9：动态block time（不是固定6h）
    arr(){

        const dist=this.flight.distance || 2500; // NM fallback
        const gs=450; // cruise speed assumption

        const hours=dist/gs;

        return new Date(this.dep().getTime()+hours*3600000);
    },

    phase(now){

        const t=now.getTime();
        const d=this.dep().getTime();
        const a=this.arr().getTime();

        if(t<d-20*60000) return "PRE-FLIGHT";
        if(t<d) return "BOARDING";
        if(t<d+30*60000) return "CLIMB";
        if(t<a-90*60000) return "CRUISE";
        if(t<a) return "DESCENT";
        return "ARRIVED";
    },

    progress(now){
        const d=this.dep().getTime();
        const a=this.arr().getTime();
        return Math.min(1,Math.max(0,(now-d)/(a-d)));
    }
};

/* ================= DISTANCE ENGINE ================= */
function haversine(lat1,lon1,lat2,lon2){

    const R=6371;

    const dLat=(lat2-lat1)*Math.PI/180;
    const dLon=(lon2-lon1)*Math.PI/180;

    const a=
        Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180)*
        Math.cos(lat2*Math.PI/180)*
        Math.sin(dLon/2)**2;

    return 2*R*Math.asin(Math.sqrt(a));
}

/* ================= FETCH ================= */
async function get(url){
    try{return await (await fetch(url)).json();}
    catch(e){return null;}
}

/* ================= MAIN ================= */
async function update(){

    const now=new Date();

    document.getElementById("clock").innerText=
        now.getHours().toString().padStart(2,"0")+":"+
        now.getMinutes().toString().padStart(2,"0");

    document.getElementById("date").innerText=
        now.toDateString();

    const f=await get("https://script.google.com/macros/s/AKfycbxSmqqVM38ZuCrrzwcm1E7179zwvAi5qjhEzaq4mXhwCOeczDP8CB2Nx7hw7zAFcqWU/exec");

    if(!f?.hasFlight){
        document.getElementById("status").innerText="NO OPS";
        return;
    }

    /* ================= CORE SET ================= */
    OPS.set(f);

    const phase=OPS.phase(now);

    document.getElementById("phase").innerText=phase;

    /* ================= ETA ================= */
    const dep=OPS.dep();
    const arr=OPS.arr();

    let cd;

    if(now<dep){
        cd=Math.floor((dep-now)/60000);
        document.getElementById("status").innerText="DEP IN";
    }else{
        cd=Math.floor((arr-now)/60000);
        document.getElementById("status").innerText="ETA";
    }

    document.getElementById("eta").innerText=cd+" min";

    /* ================= PROGRESS ================= */
    const p=OPS.progress(now);

    document.getElementById("plane").style.left=(p*100)+"%";

    /* ================= DISTANCE ================= */
    document.getElementById("distance").innerText=
        Math.round((1-p)*(f.distance||2800))+" NM";

    /* ================= WIND MODEL (SIMPLIFIED v9) ================= */
    const wind=15+Math.round(Math.random()*35);

    document.getElementById("wind").innerText=wind+" KT";

    document.getElementById("flightNo").innerText="EK "+f.flightNo;
}

/* ================= INIT ================= */
update();
setInterval(update,10000);

</script>

</body>
</html>
