<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <title>Captain Cao's Professional HUD</title>
    <style>
        :root { --bg: #000; --gold: #c1a35f; --text: #fff; --gray: #222; }
        body { margin:0; background:var(--bg); color:var(--text); font-family:"SF Pro Display",sans-serif; overflow:hidden; height:100vh; transition: background 1s; }
        
        /* 顶部 1/4 HUD */
        #top-hud { height:25vh; border-bottom:2px solid var(--gray); display:none; padding:1.5vh 2vw; background:rgba(5,5,5,0.9); position:relative; z-index:100; }
        .flight-active #top-hud { display:block; }
        
        /* 进度条 */
        .prog-line { width:94%; height:4px; background:#333; margin:4.5vh auto; position:relative; }
        #plane-icon { position:absolute; top:-18px; left:0%; font-size:30px; transition:left 1s linear; text-shadow:0 0 15px var(--gold); }
        .prog-mark { position:absolute; top:25px; font-size:1.6vh; color:#888; font-family:monospace; }

        /* 主区域 3/4 */
        #main-display { height:100vh; display:flex; transition: height 0.5s; }
        .flight-active #main-display { height:75vh; }
        #left-zone { flex:2; display:flex; flex-direction:column; justify-content:center; align-items:center; position:relative; border-right:1px solid var(--gray); }
        #main-clock { font-size:45vh; font-weight:100; letter-spacing:-2vh; line-height:1; }
        .flight-active #main-clock { font-size:28vh; }

        /* 右侧地图 1/3 */
        #sidebar { flex:1; display:none; flex-direction:column; background:#050505; }
        .flight-active #sidebar { display:flex; }
        #map-box { height:60%; width:100%; border-bottom:1px solid var(--gray); }
        #telemetry { height:40%; padding:2vh; display:flex; flex-direction:column; justify-content:space-around; }

        .stat-row { display:flex; justify-content:space-between; border-bottom:1px solid #111; padding:0.8vh 0; }
        .stat-label { color:#555; font-size:1.5vh; text-transform:uppercase; }
        .stat-val { color:var(--gold); font-size:2.5vh; font-weight:bold; font-family:monospace; }

        .corner { position:absolute; padding:3vh; }
        .weather-big { font-size:8vh; color:var(--gold); font-weight:200; }
    </style>
</head>
<body>

<div id="top-hud">
    <div class="prog-line">
        <div id="plane-icon">✈️</div>
        <div id="prog-l" class="prog-mark" style="left:0;">DEP: --:--</div>
        <div id="prog-r" class="prog-mark" style="right:0; text-align:right;">ARR: --:--</div>
    </div>
    <div style="display:grid; grid-template-columns:1.5fr 1fr 1.5fr; gap:2vw;">
        <div>
            <div id="hud-flight-id" style="font-size:4vh; font-weight:bold; color:var(--gold);">--</div>
            <div id="hud-pickup" style="font-size:2vh; color:#888;">PICKUP: --:--</div>
        </div>
        <div style="text-align:center;">
            <div id="hud-status" style="font-size:2.5vh; color:var(--gold);">SEARCHING...</div>
            <div id="hud-dest-name" style="font-size:1.8vh; color:#666;">DEST: ---</div>
        </div>
        <div style="text-align:right;">
            <div id="hud-notam" style="font-size:1.8vh; color:#aaa;">NOTAM: RUNWAY CLEAR</div>
        </div>
    </div>
</div>

<div id="main-display">
    <div id="left-zone">
        <div class="corner" style="top:0; left:0;">
            <div id="date-val" style="font-size:4vh;">-- ---</div>
            <div id="day-val" style="font-size:2vh; color:var(--gold);">--------</div>
        </div>
        <div class="corner" style="top:0; right:0; text-align:right;">
            <div id="dxb-temp" class="weather-big">--°</div>
            <div style="font-size:1.8vh; color:#666;">DUBAI DXB</div>
        </div>
        <div id="main-clock">00:00</div>
    </div>
    <div id="sidebar">
        <div id="map-box"><div id="map" style="width:100%; height:100%;"></div></div>
        <div id="telemetry">
            <div class="stat-row"><span class="stat-label">GS 地速</span><span id="st-gs" class="stat-val">--- KT</span></div>
            <div class="stat-row"><span class="stat-label">ALT 高度</span><span id="st-alt" class="stat-val">FL ---</span></div>
            <div class="stat-row"><span class="stat-label">DIST 距离</span><span id="st-dist" class="stat-val">--- NM</span></div>
            <div class="stat-row"><span class="stat-label">LAT/LON</span><span id="st-pos" class="stat-val">-- / --</span></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 你的 GAS URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxJ9BARIJhAraHdd-nCnumx583NWrNFHN20ufiYSnRiWwb-vJPNnW4IwutNhtKx15P_/exec";
    const AIRPORTS = { "DXB":[25.253,55.365], "OMDB":[25.253,55.365], "CKY":[9.577,-13.612], "DSS":[14.672,-17.073] };

    let map, marker, track;

    function initMap() {
        map = L.map('map', {zoomControl:false, attributionControl:false}).setView([25, 55], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        marker = L.marker([25, 55], {icon: L.divIcon({html:"<div id='p-rot' style='font-size:24px;'>✈️</div>", className:''})}).addTo(map);
        track = L.polyline([], {color:'#c1a35f', weight:2}).addTo(map);
    }

    async function update() {
        // 1. 时钟日期
        const n = new Date();
        document.getElementById('main-clock').innerText = n.getHours().toString().padStart(2,'0')+":"+n.getMinutes().toString().padStart(2,'0');
        const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
        document.getElementById('date-val').innerText = n.getDate() + " " + months[n.getMonth()];
        document.getElementById('day-val').innerText = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"][n.getDay()];

        // 2. 迪拜天气
        try {
            const w = await (await fetch("https://api.open-meteo.com/v1/forecast?latitude=25.25&longitude=55.36&current_weather=true")).json();
            document.getElementById('dxb-temp').innerText = Math.round(w.current_weather.temperature) + "°";
        } catch(e){}

        // 3. 航班数据与实时雷达
        try {
            const f = await (await fetch(GAS_URL)).json();
            if (f.hasFlight) {
                document.body.classList.add('flight-active');
                processRadar(f);
            } else {
                document.body.classList.remove('flight-active');
            }
        } catch(e){}
    }

    async function processRadar(fData) {
        let rawNo = fData.title.split('-')[0].replace(/\D/g, "");
        // 尝试两种呼号格式：UAE8797 或 UAE797
        const callsigns = ["UAE"+rawNo];
        if(rawNo.length === 4 && "843".includes(rawNo[0])) callsigns.push("UAE"+rawNo.substring(1));

        let liveAc = null;
        for(let c of callsigns) {
            try {
                const res = await fetch(`https://api.airplanes.live/v2/callsign/${c}`);
                const data = await res.json();
                if(data.ac && data.ac.length > 0) { liveAc = data.ac[0]; break; }
            } catch(e){}
        }

        document.getElementById('hud-flight-id').innerText = fData.title;
        document.getElementById('hud-dest-name').innerText = "DEST: " + fData.destCode;

        if (liveAc) {
            document.getElementById('hud-status').innerText = "✅ EN ROUTE";
            const pos = [liveAc.lat, liveAc.lon], gs = Math.round(liveAc.gs), alt = Math.round(liveAc.alt_baro);
            document.getElementById('st-gs').innerText = gs + " KT";
            document.getElementById('st-alt').innerText = "FL" + Math.round(alt/100);
            document.getElementById('st-pos').innerText = `${liveAc.lat.toFixed(2)} / ${liveAc.lon.toFixed(2)}`;

            // 距离进度
            const origin = AIRPORTS["DXB"], dest = AIRPORTS[fData.destCode] || [0,0];
            const getD = (p1,p2) => {
                const R=3440, d2r=Math.PI/180;
                const a = Math.sin((p2[0]-p1[0])*d2r/2)**2 + Math.cos(p1[0]*d2r)*Math.cos(p2[0]*d2r)*Math.sin((p2[1]-p1[1])*d2r/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            };
            const total = getD(origin, dest), remain = getD(pos, dest);
            const prog = Math.min(100, Math.max(0, ((total-remain)/total)*100));

            document.getElementById('plane-icon').style.left = prog + "%";
            document.getElementById('st-dist').innerText = Math.round(remain) + " NM";
            
            // 地图更新
            marker.setLatLng(pos);
            track.addLatLng(pos);
            map.panTo(pos);
            if(liveAc.track) document.getElementById('p-rot').style.transform = `rotate(${liveAc.track}deg)`;
        } else {
            document.getElementById('hud-status').innerText = "🟢 STANDBY";
        }
    }

    initMap(); update(); setInterval(update, 30000);
</script>
</body>
</html>
