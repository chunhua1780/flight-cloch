<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>777 Captain Digital HUD</title>
    <style>
        :root { --bg: #000; --gold: #c1a35f; --text: #fff; --gray: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: "SF Pro Display", -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        
        /* йЎ¶йғЁ 1/4 HUD */
        #hud-top { height: 25vh; border-bottom: 1px solid var(--gray); display: none; padding: 15px; background: #080808; box-sizing: border-box; }
        .has-flight #hud-top { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }

        /* еә•йғЁ 3/4 дё»еҢә */
        #main-display { height: 100vh; display: flex; transition: height 0.4s; }
        .has-flight #main-display { height: 75vh; }
        .in-flight #main-display { display: grid; grid-template-columns: 1fr 1fr; }

        /* жһҒиҮҙеӨ§ж—¶й’ҹ */
        #clock-zone { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        #main-clock { font-size: 45vh; font-weight: 100; letter-spacing: -2vh; }
        .has-flight #main-clock { font-size: 25vh; }
        .layover-mode #main-clock { font-size: 18vh; }

        /* еӨ©ж°”еҚЎзүҮж ·ејҸ (иӢ№жһңйЈҺж ј) */
        .weather-card { text-align: center; padding: 20px; }
        .w-icon { font-size: 6vh; margin-bottom: 10px; }
        .w-temp { font-size: 8vh; font-weight: 200; color: var(--gold); }
        .w-label { font-size: 2vh; color: #666; text-transform: uppercase; letter-spacing: 2px; }

        /* ж ҮзӯҫдёҺж•°еҖј */
        .hud-label { font-size: 1.4vh; color: #555; text-transform: uppercase; margin-bottom: 4px; }
        .hud-val { font-size: 3.2vh; font-weight: bold; color: var(--gold); }
        .hud-sub { font-size: 1.8vh; color: #888; }

        /* еҠЁжҖҒжқЎ */
        #flight-progress { grid-column: span 3; height: 4px; background: #222; position: relative; margin-top: 10px; display: none; }
        .in-flight #flight-progress { display: block; }
        #plane-mark { position: absolute; top: -15px; left: 0%; font-size: 24px; transition: left 2s linear; }

        .corner { position: absolute; padding: 20px; z-index: 5; }
    </style>
</head>
<body>

    <div id="hud-top">
        <div class="hud-cell">
            <div class="hud-label">Mission / Route</div>
            <div id="mission-id" class="hud-val">--</div>
            <div id="route-info" class="hud-sub">-- вҶ’ --</div>
            <div id="pickup-time" style="color: #fff; font-size: 2.2vh; margin-top: 5px;">PICKUP: --:--</div>
        </div>
        <div class="hud-cell" style="text-align: center; border-left: 1px solid #222; border-right: 1px solid #222;">
            <div class="hud-label">Dest Weather & Clothing</div>
            <div id="dest-w-icon" class="w-icon" style="font-size: 4vh;">--</div>
            <div id="dest-w-temp" style="font-size: 3vh; color: var(--gold);">--В°C</div>
            <div id="clothing-index" class="hud-sub">--</div>
        </div>
        <div class="hud-cell" style="text-align: right;">
            <div class="hud-label">NOTAM / Risk Ops</div>
            <div id="notam-brief" style="font-size: 1.7vh; color: #aaa; line-height: 1.4;">Scanning for airfield advisories...</div>
        </div>
        <div id="flight-progress">
            <div id="plane-mark">вңҲпёҸ</div>
        </div>
    </div>

    <div id="main-display">
        <div id="clock-zone">
            <div class="corner" style="top:0; left:0;">
                <div id="date-val" style="font-size: 3vh;">-- ---</div>
                <div id="day-val" style="font-size: 1.8vh; color: var(--gold);">--------</div>
            </div>
            <div class="corner" style="top:0; right:0; text-align:right;">
                <div id="dxb-w-icon" style="font-size: 5vh;">вҳҖпёҸ</div>
                <div id="dxb-temp" style="font-size: 6vh; font-weight: 200;">--В°</div>
            </div>
            
            <div id="main-clock">00:00</div>
            
            <div id="local-status" style="font-size: 2vh; color: #444; margin-top: -5vh;">DUBAI TIME (GST)</div>
        </div>

        <div id="dynamic-panel" style="display: none; border-left: 1px solid #1a1a1a;">
            <div id="panel-weather" class="weather-card">
                <div id="dyn-city" class="w-label">STATION</div>
                <div id="dyn-w-icon" class="w-icon">--</div>
                <div id="dyn-temp" class="w-temp">--В°</div>
                <div id="dyn-time" style="font-size: 3vh; color: #888;">--:--</div>
            </div>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxSmqqVM38ZuCrrzwcm1E7179zwvAi5qjhEzaq4mXhwCOeczDP8CB2Nx7hw7zAFcqWU/exec";
    const AIRPORT_DB = {
        "CKY": { name: "Conakry", lat: 9.57, lon: -13.61, country: "Guinea" },
        "DSS": { name: "Dakar", lat: 14.67, lon: -17.07, country: "Senegal" },
        "DXB": { name: "Dubai", lat: 25.25, lon: 55.36, country: "UAE" }
    };

    function getClothing(temp) {
        if (temp > 28) return "Shirts / Light";
        if (temp > 20) return "Casual / Cotton";
        if (temp > 12) return "Light Jacket / Layer";
        return "Heavy Jacket / Coat";
    }

    async function update() {
        const now = new Date();
        // жӣҙж–°ж—¶й’ҹ
        document.getElementById('main-clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
        document.getElementById('date-val').innerText = now.getDate() + " " + months[now.getMonth()];
        document.getElementById('day-val').innerText = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"][now.getDay()];

        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();

            if (data.hasFlight) {
                document.body.classList.add('has-flight');
                const std = new Date(data.std);
                
                // 1. иҲӘзҸӯеҸ·еӨ„зҗҶ (1KејҖеӨҙиЎҘе…Ё)
                document.getElementById('mission-id').innerText = "EK" + data.flightNo;
                document.getElementById('route-info').innerText = `${data.origin} вҶ’ ${data.dest}`;
                
                // 2. Pickup и®Ўз®— (STD - 135min)
                const pick = new Date(std.getTime() - 135 * 60000);
                document.getElementById('pickup-time').innerText = `PICKUP: ${pick.getHours().toString().padStart(2,'0')}:${pick.getMinutes().toString().padStart(2,'0')}`;

                // 3. зӣ®зҡ„ең°еӨ©ж°”дёҺз©ҝиЎЈ
                const dest = AIRPORT_DB[data.dest] || { lat: 25, lon: 55, name: data.dest };
                const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${dest.lat}&longitude=${dest.lon}&current_weather=true`);
                const wData = await wRes.json();
                const temp = Math.round(wData.current_weather.temperature);
                
                document.getElementById('dest-w-temp').innerText = temp + "В°C";
                document.getElementById('dest-w-icon').innerText = temp > 25 ? "вҳҖпёҸ" : "вӣ…";
                document.getElementById('clothing-index').innerText = getClothing(temp);
                document.getElementById('notam-brief').innerText = temp > 35 ? "CAUTION: HIGH TEMP OPS / PERF LIMITS" : "WX OPS NORMAL / NO SIGNIFICANT NOTAM";

                // 4. еҠЁжҖҒйҖ»иҫ‘ (з®ҖеҚ•жЁЎжӢҹ)
                const diffHours = (std - now) / 3600000;
                if (diffHours < 0 && diffHours > -10) { // йЈһиЎҢдёӯ
                    document.body.classList.add('in-flight');
                    document.getElementById('dynamic-panel').style.display = "block";
                    document.getElementById('dyn-city').innerText = dest.name;
                    document.getElementById('dyn-temp').innerText = temp + "В°";
                }
            } else {
                document.body.className = "";
                document.getElementById('dynamic-panel').style.display = "none";
            }

            // 5. иҝӘжӢңжң¬ең°еӨ©ж°”
            const dxbW = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=25.25&longitude=55.36&current_weather=true`);
            const dxbD = await dxbW.json();
            document.getElementById('dxb-temp').innerText = Math.round(dxbD.current_weather.temperature) + "В°";
        } catch(e) { console.log("Sync Error"); }
    }

    setInterval(update, 30000);
    update();
</script>
</body>
</html>
