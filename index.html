<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Captain's Ultimate HUD - EK797 Edition</title>
    <style>
        :root { --bg: #000; --gold: #c1a35f; --text: #fff; --gray: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; }

        /* 顶部 1/4 HUD */
        #hud-top { height: 26vh; border-bottom: 3px solid var(--gray); display: none; padding: 1.5vh 2vw; background: #050505; box-sizing: border-box; }
        .has-flight #hud-top { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

        /* 主区域 3/4 */
        #main-display { height: 100vh; display: flex; flex-direction: column; transition: height 0.4s; }
        .has-flight #main-display { height: 74vh; }

        /* 极巨化时钟 - 撑满屏幕 */
        #clock-zone { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        #main-clock { font-size: 55vh; font-weight: 900; letter-spacing: -2.5vh; line-height: 1; color: var(--text); }
        .has-flight #main-clock { font-size: 28vh; }

        /* 标签与数值 */
        .hud-label { font-size: 2vh; color: #666; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; }
        .hud-val { font-size: 4.5vh; font-weight: 900; color: var(--gold); }
        .hud-sub { font-size: 2.2vh; color: #aaa; margin-top: 5px; }

        /* 四角天气 */
        .corner { position: absolute; padding: 3vh; z-index: 100; }
        .temp-huge { font-size: 10vh; font-weight: 200; color: var(--gold); }

        /* Pickup 醒目显示 */
        #pickup-alert { background: #c1a35f; color: #000; padding: 1vh 2vw; border-radius: 10px; display: inline-block; font-weight: 900; margin-top: 1vh; }
    </style>
</head>
<body>

    <div id="hud-top">
        <div class="hud-cell">
            <div class="hud-label">Flight Mission</div>
            <div id="mission-id" class="hud-val">EK 797</div>
            <div id="route-info" class="hud-sub">CKY ➔ DSS (Stopover)</div>
            <div id="pickup-alert">PICKUP: --:--</div>
        </div>
        <div class="hud-cell" style="text-align: center; border-left: 1px solid #333; border-right: 1px solid #333;">
            <div class="hud-label">Dest Weather</div>
            <div id="dest-w-icon" style="font-size: 6vh;">☀️</div>
            <div id="dest-w-temp" class="hud-val">--°C</div>
            <div id="clothing-index" class="hud-sub">Shirts / Tropical Ops</div>
        </div>
        <div class="hud-cell" style="text-align: right;">
            <div class="hud-label">Real-time Status</div>
            <div id="notam-brief" style="font-size: 2.2vh; color: #fff; font-weight: bold; line-height: 1.3;">SYNCING WITH LIVE RADAR...</div>
            <div id="std-live" style="font-size: 2vh; color: var(--gold); margin-top: 10px;">STD (LIVE): --:--</div>
        </div>
    </div>

    <div id="main-display">
        <div id="clock-zone">
            <div class="corner" style="top:0; left:0;">
                <div id="date-val" style="font-size: 5vh; font-weight: bold;">-- ---</div>
                <div id="day-val" style="font-size: 2.5vh; color: var(--gold);">--------</div>
            </div>
            <div class="corner" style="top:0; right:0; text-align:right;">
                <div id="dxb-temp" class="temp-huge">--°</div>
                <div class="hud-label">DUBAI / DXB</div>
            </div>
            
            <div id="main-clock">00:00</div>
            
            <div id="sync-status" style="font-size: 1.8vh; color: #444; margin-top: -2vh;">EMIRATES FLEET SYNC ACTIVE</div>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxSmqqVM38ZuCrrzwcm1E7179zwvAi5qjhEzaq4mXhwCOeczDP8CB2Nx7hw7zAFcqWU/exec";
    const AIRPORTS = { "CKY": [9.57, -13.61], "DSS": [14.67, -17.07], "DXB": [25.25, 55.36] };

    // 核心：航班号清理逻辑
    function getCleanFlightNo(raw) {
        let num = raw.toString().replace(/\D/g, "");
        if (num.length === 4 && num.startsWith('8')) return num.substring(1);
        return num;
    }

    async function sync() {
        // 1. 本地时钟更新 (极致大字)
        const now = new Date();
        document.getElementById('main-clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
        document.getElementById('date-val').innerText = now.getDate() + " " + months[now.getMonth()];
        document.getElementById('day-val').innerText = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"][now.getDay()];

        // 2. 迪拜天气
        try {
            const dxb = await (await fetch("https://api.open-meteo.com/v1/forecast?latitude=25.25&longitude=55.36&current_weather=true")).json();
            document.getElementById('dxb-temp').innerText = Math.round(dxb.current_weather.temperature) + "°";
        } catch(e){}

        // 3. 联网查实时航班 & 日历数据
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();

            if (data.hasFlight) {
                document.body.classList.add('has-flight');
                const cleanNo = getCleanFlightNo(data.flightNo);
                document.getElementById('mission-id').innerText = "EK " + cleanNo;

                // --- 联网实时时间修正逻辑 ---
                // 优先使用 airplanes.live 这种雷达数据源获取真实 STD，这里模拟逻辑
                let std = new Date(data.std); 
                
                // 4. Pickup 计算修正 (STD - 135min)
                const pick = new Date(std.getTime() - 135 * 60000);
                document.getElementById('pickup-alert').innerText = `PICKUP: ${pick.getHours().toString().padStart(2,'0')}:${pick.getMinutes().toString().padStart(2,'0')}`;
                document.getElementById('std-live').innerText = `STD (LIVE): ${std.getHours().toString().padStart(2,'0')}:${std.getMinutes().toString().padStart(2,'0')}`;

                // 5. 目的地天气
                const dest = AIRPORTS[data.dest] || AIRPORTS["DSS"];
                const w = await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${dest[0]}&longitude=${dest[1]}&current_weather=true`)).json();
                document.getElementById('dest-w-temp').innerText = Math.round(w.current_weather.temperature) + "°C";
                document.getElementById('dest-w-icon').innerText = w.current_weather.weathercode < 3 ? "☀️" : "☁️";

                // 6. 运行风险 (NOTAM 模拟)
                document.getElementById('notam-brief').innerText = w.current_weather.weathercode > 60 ? "CAUTION: WET RWY / LOW VIS OPS" : "RUNWAY DRY / OPS NORMAL";

            } else {
                document.body.classList.remove('has-flight');
            }
        } catch(e) { console.log("Sync Link Lost"); }
    }

    setInterval(sync, 30000); // 30秒同步一次
    sync();
</script>
</body>
</html>
