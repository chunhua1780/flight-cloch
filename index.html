<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V30 Cockpit System</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system;
overflow:hidden;
}

/* ================= MAIN CLOCK MODE ================= */
#clock{
position:absolute;
top:10%;
width:100%;
text-align:center;
font-size:30vh;
font-weight:800;
}

#date{
position:absolute;
bottom:8%;
width:100%;
text-align:center;
font-size:3vh;
color:#aaa;
}

/* ================= WEATHER ================= */
#weather{
position:absolute;
top:20px;
right:20px;
text-align:right;
font-size:6vh;
}

/* ================= MENU ================= */
#menu{
position:fixed;
bottom:20px;
right:20px;
background:#c1a35f;
color:#000;
padding:12px;
border-radius:50%;
display:none;
z-index:9999;
}

/* ================= PANEL ================= */
#panel{
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
background:#111;
padding:15px;
width:340px;
display:none;
z-index:9999;
}

/* ================= LAYOUT ================= */
body.single .flight,
body.single .left,
body.single .right{display:none;}

body.dual .flight{display:none;}

/* ================= TRIPLE ================= */
#flightBar{
position:absolute;
top:0;
left:0;
width:100%;
height:20%;
background:#111;
display:none;
}

#left,#right{
position:absolute;
top:20%;
bottom:0;
width:50%;
}

#left{left:0;background:#050505;}
#right{right:0;background:#080808;}

/* ================= NODE SYSTEM ================= */
.node{
position:absolute;
padding:6px;
cursor:move;
user-select:none;
border:1px dashed transparent;
}

.edit .node{
border:1px dashed #444;
}

/* resize handle */
.node::after{
content:"";
position:absolute;
right:0;
bottom:0;
width:12px;
height:12px;
background:#c1a35f;
display:none;
cursor:nwse-resize;
}

.edit .node::after{
display:block;
}

/* ================= BUTTON ================= */
button{
width:100%;
margin:4px 0;
padding:8px;
background:#222;
color:#fff;
border:1px solid #444;
}

</style>
</head>

<body class="single">

<!-- MAIN SCREEN -->
<div id="clock">00:00</div>
<div id="date">---</div>
<div id="weather">☀️ 28°</div>

<!-- TRIPLE MODE -->
<div id="flightBar">FLIGHT PROGRESS</div>
<div id="left">DXB WEATHER</div>
<div id="right">DEST WEATHER</div>

<!-- MENU -->
<div id="menu">✈</div>

<!-- PANEL -->
<div id="panel">

<div style="color:#c1a35f;">LAYOUT</div>

<button onclick="setLayout('single')">Single</button>
<button onclick="setLayout('dual')">Dual</button>
<button onclick="setLayout('triple')">Triple</button>

<hr>

<div style="color:#c1a35f;">EDIT</div>

<button onclick="addNode('time')">Add Time</button>
<button onclick="addNode('date')">Add Date</button>
<button onclick="addNode('city')">Add City</button>
<button onclick="addNode('airport')">Add Airport</button>

</div>

<script>

/* ================= MENU ================= */
let t;

document.body.onclick=()=>{

menu.style.display="block";

clearTimeout(t);

t=setTimeout(()=>menu.style.display="none",5000);

};

menu.onclick=()=>panel.style.display="block";

/* ================= CLOCK ================= */
function update(){

const now=new Date();

clock.innerText=
new Intl.DateTimeFormat("en-GB",{
timeZone:"Asia/Dubai",
hour:"2-digit",
minute:"2-digit"
}).format(now);

date.innerText=
new Intl.DateTimeFormat("en-GB",{
timeZone:"Asia/Dubai",
weekday:"long",
year:"numeric",
month:"short",
day:"numeric"
}).format(now);

}

setInterval(update,1000);
update();

/* ================= LAYOUT ================= */
function setLayout(l){
document.body.className=l;
}

/* ================= NODE ENGINE ================= */
function addNode(type){

let el=document.createElement("div");
el.className="node";

/* default smart binding */
if(type==="time") el.innerText="00:00";
if(type==="date") el.innerText=new Date().toDateString();
if(type==="city") el.innerText="Dubai";
if(type==="airport") el.innerText="DXB";

/* drag */
drag(el);

/* resize */
resize(el);

document.body.appendChild(el);

}

/* ================= DRAG ================= */
function drag(el){

let ox,oy;

el.onmousedown=(e)=>{

ox=e.offsetX;
oy=e.offsetY;

document.onmousemove=(e)=>{

if(!document.body.classList.contains("edit")) return;

el.style.left=(e.pageX-ox)+"px";
el.style.top=(e.pageY-oy)+"px";

};

document.onmouseup=()=>document.onmousemove=null;

};

}

/* ================= RESIZE ================= */
function resize(el){

let startX,startY,startW,startH;

el.onmousedown=(e)=>{

if(e.offsetX < el.clientWidth-15) return;

startX=e.pageX;
startY=e.pageY;

startW=el.clientWidth;
startH=el.clientHeight;

document.onmousemove=(e)=>{

el.style.width=startW+(e.pageX-startX)+"px";
el.style.height=startH+(e.pageY-startY)+"px";

};

document.onmouseup=()=>document.onmousemove=null;

};

}

</script>

</body>
</html>
