<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pilot Dashboard</title>
    <style>
        :root {
            --bg-color: #000;
            --text-main: #ffffff;
            --accent-gold: #c1a35f;
            --dim-gray: #2c2c2e;
            --font-weight-thin: 200;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* 顶部 1/4 区域：航班动态 */
        #top-info {
            height: 25vh;
            border-bottom: 1px solid var(--dim-gray);
            display: none; /* 默认隐藏 */
            padding: 20px;
            background: linear-gradient(180deg, #111 0%, #000 100%);
        }

        /* 航班模式下的网格布局 */
        .flight-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1.5fr;
            height: 100%;
            align-items: center;
        }

        /* 进度条 */
        #progress-container {
            grid-column: span 3;
            height: 6px;
            background: var(--dim-gray);
            border-radius: 3px;
            margin-bottom: 10px;
            overflow: hidden;
            display: none; /* 起飞后显示 */
        }
        #progress-bar {
            height: 100%;
            background: var(--accent-gold);
            width: 0%;
            transition: width 1s linear;
        }

        /* 下部 3/4 区域 */
        #bottom-display {
            height: 100vh; /* 默认全屏 */
            display: flex;
            transition: height 0.5s ease;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 时钟样式 */
        #main-clock {
            font-size: 14rem;
            font-weight: var(--font-weight-thin);
            line-height: 1;
            margin: 10px 0;
        }

        .weather-text { font-size: 1.5rem; color: #aaa; margin-top: 10px; }
        .temp { font-size: 3rem; color: var(--accent-gold); }
        .city-label { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; color: #666; }

        /* 状态切换辅助类 */
        .flight-active #top-info { display: block; }
        .flight-active #bottom-display { height: 75vh; }
        .flight-active #main-clock { font-size: 8rem; }
    </style>
</head>
<body>

    <div id="top-info">
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div class="flight-grid">
            <div id="flight-left">
                <div id="route-display" style="font-size: 1.8rem; font-weight: bold;">--</div>
                <div id="pickup-display" style="font-size: 1.2rem; color: var(--accent-gold);"></div>
            </div>
            <div id="flight-center" style="text-align: center;">
                <div class="city-label">DEST Weather</div>
                <div id="dest-temp" class="temp">--°</div>
            </div>
            <div id="flight-right" style="font-size: 1rem; color: #888; overflow-y: auto;">
                <div class="city-label">NOTAM (TL;DR)</div>
                <div id="notam-summary">等待数据同步...</div>
            </div>
        </div>
    </div>

    <div id="bottom-display">
        <div class="panel" id="primary-panel">
            <div class="city-label">Dubai</div>
            <div id="main-clock">00:00</div>
            <div id="dxb-weather" class="weather-text">加载天气中...</div>
        </div>
        
        <div class="panel" id="secondary-panel" style="display: none; border-left: 1px solid var(--dim-gray);">
            <div id="dest-city-name" class="city-label">Destination</div>
            <div id="dest-clock" style="font-size: 5rem; font-weight: 200;">00:00</div>
            <div id="dest-weather-detail" class="weather-text">--</div>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbymazjvqvO225sN40UpVmjXJaaXdMMlOQgC7E2Cnt1z7g4z0vnQXtcs8uWvPyuqLwi5/exec";

    function updateTime() {
        const now = new Date();
        document.getElementById('main-clock').innerText = 
            now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0');
        
        // 如果有目的地时钟，这里也要同步更新
    }

    async function checkSchedule() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            if (data.hasFlight) {
                document.body.classList.add('flight-active');
                renderFlightData(data);
            } else {
                document.body.classList.remove('flight-active');
                document.getElementById('secondary-panel').style.display = 'none';
            }
        } catch (e) {
            console.log("Data fetch failed");
        }
    }

    function renderFlightData(data) {
        // 显示航线
        document.getElementById('route-display').innerText = data.title;
        
        // 计算 Pick up 时间 (GAS已经计算好了传过来)
        const p = new Date(data.pickupTime);
        document.getElementById('pickup-display').innerText = 
            "Pickup: " + p.getHours().toString().padStart(2, '0') + ":" + 
            p.getMinutes().toString().padStart(2, '0');

        // 这里预留天气和进度条逻辑
    }

    // 初始化
    setInterval(updateTime, 1000);
    setInterval(checkSchedule, 600000); // 每10分钟检查一次日历
    updateTime();
    checkSchedule();

</script>
</body>
</html>
