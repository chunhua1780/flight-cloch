<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flight Cockpit V24</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system;
overflow:hidden;
}

/* ================= LAYOUT ================= */
.layout-single #left,.layout-single #right{display:none;}
.layout-double #right{display:none;}
.layout-triple #left,#right{display:block;}

/* ================= ELEMENTS ================= */
#clock{
font-size:30vh;
text-align:center;
margin-top:5vh;
cursor:move;
}

#date,#city,#country{
text-align:center;
font-size:3vh;
color:#aaa;
cursor:move;
}

#weather{
position:absolute;
top:20px;
right:20px;
text-align:right;
cursor:ns-resize; /* only vertical */
}

#wicon{font-size:6vh;}
#wtemp{font-size:2vh;color:#aaa;}

/* ================= PANELS ================= */
.panel{
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
background:#111;
padding:15px;
border-radius:12px;
display:none;
z-index:10000;
width:320px;
max-height:70vh;
overflow:auto;
}

input,select{
width:100%;
margin:4px 0;
padding:6px;
background:#000;
color:#fff;
border:1px solid #333;
}

/* ================= BUTTONS ================= */
#menu,#edit,#calendarBtn{
position:fixed;
right:20px;
background:#c1a35f;
color:#000;
padding:12px;
border-radius:50%;
display:none;
z-index:9999;
}

#menu{bottom:20px;}
#edit{top:20px;}
#calendarBtn{bottom:80px;}

/* ================= DRAG ================= */
.draggable{
position:absolute;
cursor:move;
}

.resizeable{
resize:both;
overflow:auto;
}

/* ================= CALENDAR ================= */
#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:2px;
font-size:12px;
}

.day{
background:#000;
border:1px solid #333;
padding:8px;
min-height:40px;
cursor:pointer;
}

.day:hover{background:#111;}

</style>
</head>

<body class="layout-single">

<!-- CLOCK -->
<div id="clock" class="draggable">00:00</div>

<div id="date" class="draggable">---</div>
<div id="city" class="draggable">Dubai</div>
<div id="country" class="draggable">UAE</div>

<!-- WEATHER -->
<div id="weather" class="draggable">
<div id="wicon">☀️</div>
<div id="wtemp">--°</div>
</div>

<!-- BUTTONS -->
<div id="menu">✈</div>
<div id="edit">⚙</div>
<div id="calendarBtn">📅</div>

<!-- SETTINGS -->
<div id="settings" class="panel">

<div style="color:#c1a35f;">LAYOUT</div>

<button onclick="setLayout('layout-single')">Single</button>
<button onclick="setLayout('layout-double')">Double</button>
<button onclick="setLayout('layout-triple')">Triple</button>

<hr>

<div style="color:#c1a35f;">ADD ELEMENT</div>

<button onclick="addElement('date')">Date</button>
<button onclick="addElement('city')">City</button>
<button onclick="addElement('country')">Country</button>

</div>

<!-- CALENDAR -->
<div id="calendarPanel" class="panel">

<div style="display:flex;justify-content:space-between;">
<button onclick="prevMonth()">◀</button>
<div id="month"></div>
<button onclick="nextMonth()">▶</button>
</div>

<div id="calendar"></div>

</div>

<script>

/* ================= MENU ================= */
let t;

document.body.onclick=()=>{

menu.style.display="block";
edit.style.display="block";
calendarBtn.style.display="block";

clearTimeout(t);
t=setTimeout(()=>{
menu.style.display="none";
edit.style.display="none";
calendarBtn.style.display="none";
},5000);

};

/* ================= OPEN ================= */
edit.onclick=()=>settings.style.display="block";
calendarBtn.onclick=()=>calendarPanel.style.display="block";

/* ================= LAYOUT ================= */
function setLayout(v){
document.body.className=v;
localStorage.setItem("layout",v);
}

/* ================= DRAG ================= */
function drag(el){

let ox,oy;

el.onmousedown=(e)=>{

ox=e.offsetX;
oy=e.offsetY;

document.onmousemove=(e)=>{

el.style.left=(e.pageX-ox)+"px";
el.style.top=(e.pageY-oy)+"px";

};

document.onmouseup=()=>document.onmousemove=null;

};

}

document.querySelectorAll(".draggable").forEach(drag);

/* ================= ADD ELEMENT ================= */
function addElement(type){

let el=document.createElement("div");
el.className="draggable";
el.innerText=type.toUpperCase();
el.style.top="200px";
el.style.left="200px";

document.body.appendChild(el);

drag(el);

}

/* ================= CALENDAR ================= */
let now=new Date();

function renderCalendar(){

let y=now.getFullYear();
let m=now.getMonth();

month.innerText=y+"-"+(m+1);

calendar.innerHTML="";

let first=new Date(y,m,1).getDay();
let days=new Date(y,m+1,0).getDate();

for(let i=0;i<first;i++){
calendar.innerHTML+="<div></div>";
}

for(let d=1;d<=days;d++){

let div=document.createElement("div");
div.className="day";
div.innerText=d;

div.onclick=()=>{

let f=prompt("Flight for "+d);

if(f){
localStorage.setItem("flight_"+y+"_"+m+"_"+d,f);
}

};

calendar.appendChild(div);

}

}

function prevMonth(){now.setMonth(now.getMonth()-1);renderCalendar();}
function nextMonth(){now.setMonth(now.getMonth()+1);renderCalendar();}

/* ================= WEATHER ================= */
function weather(){
wicon.innerText="☀️";
wtemp.innerText="28°";
}

/* ================= INIT ================= */
renderCalendar();
weather();

</script>

</body>
</html>
