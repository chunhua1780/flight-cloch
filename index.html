<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flight Cockpit V23</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system;
overflow:hidden;
}

/* CLOCK */
#clock{
font-size:32vh;
text-align:center;
margin-top:6vh;
font-weight:800;
cursor:move;
}

#date{
text-align:center;
font-size:3vh;
color:#aaa;
cursor:move;
}

/* WEATHER */
#weather{
position:absolute;
top:20px;
right:20px;
text-align:right;
cursor:move;
}
#wicon{font-size:6vh;}
#wtemp{font-size:2vh;color:#aaa;}

/* BUTTONS */
#menuBtn,#editBtn,#mgrBtn{
position:fixed;
right:20px;
padding:12px 14px;
border-radius:50%;
background:#c1a35f;
color:#000;
display:none;
z-index:9999;
}

#menuBtn{bottom:20px;}
#editBtn{top:20px;}
#mgrBtn{bottom:80px;}

/* PANELS */
.panel{
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
background:#111;
padding:15px;
border-radius:12px;
display:none;
z-index:10000;
width:300px;
max-height:70vh;
overflow:auto;
}

input,select{
width:100%;
margin:4px 0;
padding:6px;
background:#000;
color:#fff;
border:1px solid #333;
}

button{
width:100%;
margin-top:6px;
padding:8px;
background:#222;
color:#fff;
border:1px solid #444;
}

/* DRAG MODE */
.draggable{
position:absolute;
cursor:move;
}

/* FLIGHT LIST */
.flightItem{
background:#000;
padding:6px;
margin:4px 0;
border:1px solid #333;
}

.smallBtn{
font-size:12px;
padding:4px;
margin-top:4px;
}

</style>
</head>

<body>

<!-- CLOCK -->
<div id="clock" class="draggable">00:00</div>

<!-- DATE -->
<div id="date" class="draggable">---</div>

<!-- WEATHER -->
<div id="weather" class="draggable">
<div id="wicon">☀️</div>
<div id="wtemp">--°</div>
</div>

<!-- BUTTONS -->
<div id="menuBtn">✈</div>
<div id="editBtn">⚙</div>
<div id="mgrBtn">📅</div>

<!-- FLIGHT MANAGER -->
<div id="manager" class="panel">

<div style="color:#c1a35f;">FLIGHT MANAGER</div>

<input id="fno" placeholder="EK838">
<input id="org" placeholder="DXB">
<input id="dst" placeholder="LHR">
<input id="ftime" type="datetime-local">

<button onclick="addFlight()">ADD FLIGHT</button>

<div id="list"></div>

</div>

<script>

/* ================= DATA ================= */
let flights=JSON.parse(localStorage.getItem("flights")||"[]");

/* ================= SHOW MENU ================= */
let t;

document.body.onclick=()=>{

menuBtn.style.display="block";
editBtn.style.display="block";
mgrBtn.style.display="block";

clearTimeout(t);

t=setTimeout(()=>{
menuBtn.style.display="none";
editBtn.style.display="none";
mgrBtn.style.display="none";
},5000);

};

/* ================= OPEN MANAGER ================= */
mgrBtn.onclick=()=>{

manager.style.display="block";
renderList();

};

/* ================= CLOCK ================= */
function clock(){

let n=new Date();

clock.innerText=
n.getHours().toString().padStart(2,'0')+":"+
n.getMinutes().toString().padStart(2,'0');

date.innerText=
n.toDateString();

}

/* ================= WEATHER ================= */
function weather(){
wicon.innerText="☀️";
wtemp.innerText="28°";
}

/* ================= ADD FLIGHT ================= */
function addFlight(){

flights.push({
id:Date.now(),
no:fno.value,
org:org.value,
dst:dst.value,
time:ftime.value
});

save();

renderList();

}

/* ================= DELETE ================= */
function del(id){

flights=flights.filter(f=>f.id!==id);

save();

renderList();

}

/* ================= RENDER LIST ================= */
function renderList(){

list.innerHTML="";

flights.forEach(f=>{

let div=document.createElement("div");
div.className="flightItem";

div.innerHTML=`
${f.no}<br>
${f.org} → ${f.dst}<br>
${f.time}<br>
<button class="smallBtn" onclick="del(${f.id})">DELETE</button>
`;

list.appendChild(div);

});

}

/* ================= SAVE ================= */
function save(){

localStorage.setItem("flights",JSON.stringify(flights));

}

/* ================= DRAG SYSTEM ================= */
function drag(el){

let ox,oy;

el.onmousedown=(e)=>{

ox=e.offsetX;
oy=e.offsetY;

document.onmousemove=(e)=>{

el.style.left=(e.pageX-ox)+"px";
el.style.top=(e.pageY-oy)+"px";

};

document.onmouseup=()=>document.onmousemove=null;

};

}

function enableDrag(){

document.querySelectorAll(".draggable").forEach(drag);

}

/* ================= EDIT MODE ================= */
editBtn.onclick=()=>enableDrag();

/* ================= LOOP ================= */
setInterval(clock,1000);

clock();
weather();

</script>

</body>
</html>
