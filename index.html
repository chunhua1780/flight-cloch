<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flight Cockpit V22 Stable</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system;
overflow:hidden;
}

/* CLOCK */
#clock{
font-size:34vh;
text-align:center;
margin-top:6vh;
font-weight:800;
letter-spacing:-2px;
}

/* DATE */
#date{
text-align:center;
font-size:3vh;
color:#aaa;
}

/* WEATHER */
#weather{
position:absolute;
top:20px;
right:20px;
text-align:right;
}
#wicon{font-size:6vh;}
#wtemp{font-size:2.2vh;color:#aaa;}

/* FLIGHT */
#flight{
position:absolute;
top:20px;
left:20px;
background:#111;
padding:12px;
border-radius:10px;
min-width:220px;
display:none;
white-space:pre-line;
}

#flight.active{display:block;}

/* BUTTONS */
#menuBtn,#setBtn{
position:fixed;
right:20px;
padding:12px 14px;
border-radius:50%;
background:#c1a35f;
color:#000;
display:none;
z-index:9999;
}

#menuBtn{bottom:20px;}
#setBtn{top:20px;}

/* PANEL */
.panel{
position:fixed;
top:15%;
left:50%;
transform:translateX(-50%);
background:#111;
padding:15px;
border-radius:12px;
display:none;
z-index:10000;
width:260px;
}

input{
width:100%;
margin:4px 0;
padding:6px;
background:#000;
color:#fff;
border:1px solid #333;
}

button{
width:100%;
margin-top:6px;
padding:8px;
background:#222;
color:#fff;
border:1px solid #444;
}

</style>
</head>

<body>

<!-- WEATHER -->
<div id="weather">
<div id="wicon">☀️</div>
<div id="wtemp">--°</div>
</div>

<!-- CLOCK -->
<div id="clock">--:--</div>

<!-- DATE -->
<div id="date">---</div>

<!-- FLIGHT -->
<div id="flight"></div>

<!-- BUTTONS -->
<div id="menuBtn">✈</div>
<div id="setBtn">⚙</div>

<!-- FLIGHT PANEL -->
<div id="flightPanel" class="panel">

<div style="color:#c1a35f;">ADD FLIGHT</div>

<input id="fno" placeholder="838 / EK838">
<input id="org" placeholder="DXB">
<input id="dst" placeholder="LHR">
<input id="ftime" type="datetime-local">

<button onclick="saveFlight()">SAVE FLIGHT</button>

</div>

<script>

/* ================= CONFIG ================= */
const TZ="Asia/Dubai";

/* ================= UI TRIGGER ================= */
let t;

document.body.onclick=()=>{

menuBtn.style.display="block";
setBtn.style.display="block";

clearTimeout(t);
t=setTimeout(()=>{
menuBtn.style.display="none";
setBtn.style.display="none";
},5000);

};

/* ================= OPEN PANEL ================= */
menuBtn.onclick=()=>flightPanel.style.display="block";

/* ================= CLOCK (FIXED + SAFE) ================= */
function updateClock(){

const now=new Date();

const time=new Intl.DateTimeFormat("en-GB",{
timeZone:TZ,
hour:"2-digit",
minute:"2-digit",
hour12:false
}).format(now);

const date=new Intl.DateTimeFormat("en-GB",{
timeZone:TZ,
weekday:"long",
year:"numeric",
month:"short",
day:"numeric"
}).format(now);

clock.innerText=time;
date.innerText=date;

}

/* ================= WEATHER ================= */
async function updateWeather(){

try{

const r=await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=25.25&longitude=55.36&current_weather=true"
);

const d=await r.json();

wtemp.innerText=Math.round(d.current_weather.temperature)+"°C";
wicon.innerText="☀️";

}catch(e){
wtemp.innerText="--°";
}

}

/* ================= DATA SOURCE ================= */
function getManual(){

return JSON.parse(localStorage.getItem("manualFlight")||"null");

}

/* ================= FLIGHT RENDER ================= */
function renderFlight(){

let f=getManual();

if(!f){
flight.classList.remove("active");
return;
}

flight.classList.add("active");

flight.innerText=
`${f.flightNo}
${f.origin} → ${f.dest}`;

}

/* ================= SAVE FLIGHT ================= */
function saveFlight(){

let f={
flightNo: (fno.value.startsWith("EK")?fno.value:"EK"+fno.value),
origin:org.value,
dest:dst.value,
std:new Date(ftime.value).toISOString()
};

localStorage.setItem("manualFlight",JSON.stringify(f));

flightPanel.style.display="none";

location.reload();

}

/* ================= LOOP ================= */
setInterval(updateClock,1000);
setInterval(updateWeather,60000);
setInterval(renderFlight,3000);

updateClock();
updateWeather();
renderFlight();

</script>

</body>
</html>
