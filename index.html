<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flight Cockpit V25 Engine</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system;
overflow:hidden;
}

/* ================= CLOCK FIX ================= */
#clock{
font-size:30vh;
text-align:center;
margin-top:6vh;
font-weight:800;
cursor:move;
}

#date{
text-align:center;
font-size:3vh;
color:#aaa;
cursor:move;
}

/* ================= WEATHER ================= */
#weather{
position:absolute;
top:20px;
right:20px;
text-align:right;
cursor:move;
}

#wicon{font-size:6vh;}
#wtemp{font-size:2vh;color:#aaa;}

/* ================= LAYOUT ================= */
.single .flight,.single .side{display:none;}
.dual .side{display:none;}
.triple .side{display:block;}

/* ================= PANELS ================= */
.panel{
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
background:#111;
padding:15px;
border-radius:12px;
display:none;
z-index:10000;
width:320px;
}

/* ================= ELEMENT ================= */
.element{
position:absolute;
padding:6px;
cursor:move;
user-select:none;
}

/* ================= BUTTON ================= */
#menu,#edit,#layoutBtn{
position:fixed;
right:20px;
background:#c1a35f;
color:#000;
padding:12px;
border-radius:50%;
display:none;
z-index:9999;
}

#menu{bottom:20px;}
#edit{top:20px;}
#layoutBtn{bottom:80px;}

</style>
</head>

<body class="single">

<!-- CORE -->
<div id="clock" class="element">00:00</div>
<div id="date" class="element">---</div>

<!-- WEATHER -->
<div id="weather" class="element">
<div id="wicon">☀️</div>
<div id="wtemp">--°</div>
</div>

<!-- BUTTONS -->
<div id="menu">✈</div>
<div id="edit">⚙</div>
<div id="layoutBtn">🧭</div>

<!-- PANEL -->
<div id="panel" class="panel">

<div style="color:#c1a35f;">LAYOUT</div>

<button onclick="setLayout('single')">Single</button>
<button onclick="setLayout('dual')">Dual</button>
<button onclick="setLayout('triple')">Triple</button>

<hr>

<div style="color:#c1a35f;">ADD ELEMENT</div>

<button onclick="addElement('date')">Date</button>
<button onclick="addElement('city')">City</button>
<button onclick="addElement('country')">Country</button>
<button onclick="addElement('flight')">Flight</button>

</div>

<script>

/* ================= STATE ================= */
let state={
elements:[]
};

/* ================= MENU ================= */
let t;

document.body.onclick=()=>{

menu.style.display="block";
edit.style.display="block";
layoutBtn.style.display="block";

clearTimeout(t);
t=setTimeout(()=>{
menu.style.display="none";
edit.style.display="none";
layoutBtn.style.display="none";
},5000);

};

/* ================= PANEL ================= */
edit.onclick=()=>panel.style.display="block";

/* ================= CLOCK FIX ================= */
function updateClock(){

const now=new Date();

const time=new Intl.DateTimeFormat("en-GB",{
timeZone:"Asia/Dubai",
hour:"2-digit",
minute:"2-digit",
hour12:false
}).format(now);

clock.innerText=time;

date.innerText=
new Intl.DateTimeFormat("en-GB",{
timeZone:"Asia/Dubai",
weekday:"long",
year:"numeric",
month:"short",
day:"numeric"
}).format(now);

}

/* ================= WEATHER ================= */
function weather(){
wicon.innerText="☀️";
wtemp.innerText="28°";
}

/* ================= LAYOUT ENGINE ================= */
function setLayout(l){

document.body.className=l;

localStorage.setItem("layout",l);

}

/* ================= ELEMENT ENGINE ================= */
function addElement(type){

let el=document.createElement("div");

el.className="element";

el.dataset.type=type;

/* AUTO VALUE SYSTEM */
if(type==="date"){
el.innerText=new Date().toDateString();
}

if(type==="city"){
el.innerText="Dubai";
}

if(type==="country"){
el.innerText="UAE";
}

if(type==="flight"){
el.innerText="EK---";
}

/* DRAG */
drag(el);

document.body.appendChild(el);

state.elements.push(el);

}

/* ================= DRAG ================= */
function drag(el){

let ox,oy;

el.onmousedown=(e)=>{

ox=e.offsetX;
oy=e.offsetY;

document.onmousemove=(e)=>{

el.style.left=(e.pageX-ox)+"px";
el.style.top=(e.pageY-oy)+"px";

};

document.onmouseup=()=>document.onmousemove=null;

};

}

/* ================= AUTO COUNTRY ================= */
function detectLocation(){

navigator.geolocation?.getCurrentPosition(pos=>{

// simplified mapping
state.location="Dubai";

});

}

/* ================= LOOP ================= */
setInterval(updateClock,1000);
setInterval(weather,60000);

updateClock();
weather();
detectLocation();

</script>

</body>
</html>
