<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V26 Cockpit Engine</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system;
overflow:hidden;
}

/* ================= EDIT MODE ================= */
.edit-mode .element{
outline:1px dashed #444;
cursor:move;
}

/* ================= ELEMENT ================= */
.element{
position:absolute;
padding:6px;
user-select:none;
}

/* ================= CLOCK ================= */
#clock{
font-size:28vh;
text-align:center;
font-weight:800;
top:10vh;
left:50%;
transform:translateX(-50%);
}

/* ================= DATE ================= */
#date{
font-size:3vh;
color:#aaa;
top:45vh;
left:50%;
transform:translateX(-50%);
}

/* ================= WEATHER ================= */
#weather{
top:20px;
right:20px;
text-align:right;
}

#wicon{font-size:6vh;}
#wtemp{font-size:2vh;color:#aaa;}

/* ================= LAYOUT ================= */
body.single .side,
body.single .topbar{display:none;}

body.dual .side{display:none;}

body.triple .topbar{display:block;}

/* ================= TOP BAR ================= */
#topbar{
position:absolute;
top:0;
left:0;
width:100%;
height:10vh;
background:#111;
display:none;
align-items:center;
justify-content:center;
}

/* ================= SIDES ================= */
.side{
position:absolute;
top:10vh;
bottom:0;
width:50%;
}

#left{left:0;background:#050505;}
#right{right:0;background:#080808;}

/* ================= BUTTONS ================= */
#menu,#edit,#layout{
position:fixed;
right:20px;
background:#c1a35f;
color:#000;
padding:12px;
border-radius:50%;
display:none;
z-index:9999;
}

#menu{bottom:20px;}
#edit{top:20px;}
#layout{bottom:80px;}

/* ================= PANEL ================= */
#panel{
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
background:#111;
padding:15px;
width:320px;
border-radius:12px;
display:none;
z-index:10000;
}

button{
width:100%;
margin:4px 0;
padding:8px;
background:#222;
color:#fff;
border:1px solid #444;
}

</style>
</head>

<body class="single">

<!-- CORE -->
<div id="clock" class="element">00:00</div>
<div id="date" class="element">---</div>

<!-- WEATHER -->
<div id="weather" class="element">
<div id="wicon">☀️</div>
<div id="wtemp">--°</div>
</div>

<!-- TRIPLE MODE -->
<div id="topbar" class="topbar">FLIGHT STATUS BAR</div>
<div id="left" class="side">DXB WEATHER</div>
<div id="right" class="side">DEST WEATHER</div>

<!-- BUTTONS -->
<div id="menu">✈</div>
<div id="edit">⚙</div>
<div id="layout">🧭</div>

<!-- PANEL -->
<div id="panel">

<div style="color:#c1a35f;">LAYOUT</div>

<button onclick="setLayout('single')">Single</button>
<button onclick="setLayout('dual')">Dual</button>
<button onclick="setLayout('triple')">Triple</button>

<hr>

<div style="color:#c1a35f;">ELEMENTS</div>

<button onclick="addElement('date')">Add Date</button>
<button onclick="addElement('city')">Add City</button>
<button onclick="addElement('country')">Add Country</button>
<button onclick="addElement('delete-mode')">Enable Delete Mode</button>

</div>

<script>

/* ================= STATE ================= */
let deleteMode=false;

/* ================= MENU ================= */
let t;

document.body.onclick=()=>{

menu.style.display="block";
edit.style.display="block";
layout.style.display="block";

clearTimeout(t);
t=setTimeout(()=>{
menu.style.display="none";
edit.style.display="none";
layout.style.display="none";
},5000);

};

/* ================= PANEL ================= */
edit.onclick=()=>{
document.body.classList.toggle("edit-mode");
panel.style.display="block";
};

/* ================= LAYOUT ================= */
function setLayout(l){

document.body.className=l;

localStorage.setItem("layout",l);

}

/* ================= CLOCK FIX ================= */
function updateClock(){

const now=new Date();

clock.innerText=
new Intl.DateTimeFormat("en-GB",{
timeZone:"Asia/Dubai",
hour:"2-digit",
minute:"2-digit",
hour12:false
}).format(now);

date.innerText=
new Intl.DateTimeFormat("en-GB",{
timeZone:"Asia/Dubai",
weekday:"long",
year:"numeric",
month:"short",
day:"numeric"
}).format(now);

}

/* ================= ELEMENT ENGINE ================= */
function addElement(type){

let el=document.createElement("div");

el.className="element";
el.innerText=type.toUpperCase();

/* auto value */
if(type==="date") el.innerText=new Date().toDateString();
if(type==="city") el.innerText="Dubai";
if(type==="country") el.innerText="UAE";

/* DELETE SUPPORT */
el.onclick=()=>{

if(deleteMode){
el.remove();
save();
}

};

drag(el);

document.body.appendChild(el);

}

/* ================= DRAG ENGINE ================= */
function drag(el){

let ox,oy;

el.onmousedown=(e)=>{

ox=e.offsetX;
oy=e.offsetY;

document.onmousemove=(e)=>{

if(!document.body.classList.contains("edit-mode")) return;

el.style.left=(e.pageX-ox)+"px";
el.style.top=(e.pageY-oy)+"px";

};

document.onmouseup=()=>document.onmousemove=null;

};

}

/* ================= DELETE MODE ================= */
function enableDelete(){

deleteMode=!deleteMode;

alert("Delete Mode: "+deleteMode);

}

/* ================= LOOP ================= */
setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>
