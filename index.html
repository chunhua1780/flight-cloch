<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <title>Captain Cao's Ultimate HUD</title>
    <style>
        :root { --bg: #000; --gold: #c1a35f; --text: #fff; --gray: #222; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; transition: all 1.5s ease; }
        
        /* 1/4 顶部 HUD */
        #top-hud { height: 25vh; border-bottom: 2px solid var(--gray); display: none; padding: 1.5vh 2vw; box-sizing: border-box; background: rgba(5,5,5,0.95); position: relative; z-index: 100; }
        .flight-active #top-hud { display: block; }

        /* 进度条系统 */
        .progress-line { width: 90%; height: 4px; background: #333; margin: 4.5vh auto; position: relative; border-radius: 2px; }
        #plane-icon { position: absolute; top: -18px; left: 0%; font-size: 30px; transition: left 2s linear; text-shadow: 0 0 15px var(--gold); }
        .prog-mark { position: absolute; top: 25px; font-size: 1.6vh; color: #777; white-space: nowrap; font-family: monospace; }

        /* 主显示区 3/4 */
        #main-display { height: 100vh; display: flex; transition: height 0.5s ease; position: relative; }
        .flight-active #main-display { height: 75vh; }
        
        /* 左侧主显示屏 (2/3) */
        #left-zone { flex: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; border-right: 1px solid var(--gray); }
        #main-clock { font-size: 45vh; font-weight: 100; line-height: 1; letter-spacing: -2vh; }
        .flight-active #main-clock { font-size: 28vh; }

        /* 右侧 1/3 地图与参数区 */
        #right-sidebar { flex: 1; display: none; flex-direction: column; background: #050505; }
        .flight-active #right-sidebar { display: flex; }
        #map-box { height: 60%; width: 100%; border-bottom: 1px solid var(--gray); }
        #telemetry-box { height: 40%; padding: 2vh; display: flex; flex-direction: column; justify-content: space-around; }

        /* 状态与天气组件 */
        .weather-corner { position: absolute; top: 3vh; right: 3vw; text-align: right; }
        .date-corner { position: absolute; top: 3vh; left: 3vw; }
        .weather-icon { font-size: 8vh; margin-bottom: -1vh; }
        .temp-val { font-size: 6vh; color: var(--gold); font-weight: 200; }
        
        /* 风格变换 */
        .style-night { --bg: #000; filter: brightness(0.9); }
        .style-day { --bg: #0a0a0a; }

        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 0.8vh 0; }
        .stat-label { color: #555; font-size: 1.5vh; text-transform: uppercase; }
        .stat-val { color: var(--gold); font-size: 2.5vh; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>

    <div id="top-hud">
        <div id="hud-normal" class="hud-grid" style="display: grid; grid-template-columns: 1fr 1fr 1fr; height: 100%;">
            <div class="hud-cell">
                <div style="font-size: 1.5vh; color: #555;">MISSION / PICKUP</div>
                <div id="hud-flight-id" style="font-size: 4vh; font-weight: bold; color: var(--gold);">--</div>
                <div id="hud-pickup" style="font-size: 2vh; color: #888;">--:--</div>
            </div>
            <div class="hud-cell" style="text-align: center;">
                <div id="hud-dest-icon" style="font-size: 5vh;">☀️</div>
                <div id="hud-dest-temp" style="font-size: 3vh; color: var(--gold);">--°C</div>
                <div style="font-size: 1.4vh; color: #555;">DESTINATION WX</div>
            </div>
            <div class="hud-cell" style="text-align: right;">
                <div style="font-size: 1.5vh; color: #555;">NOTAM / STATUS</div>
                <div id="hud-status" style="font-size: 2vh; color: #bbb;">READY</div>
                <div id="hud-notam" style="font-size: 1.6vh; color: #777;">No major hazards expected.</div>
            </div>
        </div>
        
        <div id="hud-cruise" style="display: none; width: 100%;">
            <div class="progress-line">
                <div id="plane-icon">✈️</div>
                <div id="prog-left" class="prog-mark" style="left:0;">DEP: --:--</div>
                <div id="prog-right" class="prog-mark" style="right:0; text-align:right;">ARR: --:--</div>
            </div>
        </div>
    </div>

    <div id="main-display">
        <div id="left-zone">
            <div class="date-corner">
                <div id="date-val" style="font-size: 4vh;">-- ---</div>
                <div id="day-val" style="font-size: 2vh; color: var(--gold);">--------</div>
            </div>
            <div class="weather-corner">
                <div id="main-w-icon" class="weather-icon">☀️</div>
                <div id="main-temp" class="temp-val">--°</div>
            </div>
            <div id="main-clock">00:00</div>
        </div>

        <div id="right-sidebar">
            <div id="map-box"><div id="map" style="width:100%; height:100%;"></div></div>
            <div id="telemetry-box">
                <div class="stat-row"><span class="stat-label">Ground Speed</span><span id="st-gs" class="stat-val">--- KT</span></div>
                <div class="stat-row"><span class="stat-label">Altitude</span><span id="st-alt" class="stat-val">FL ---</span></div>
                <div class="stat-row"><span class="stat-label">Distance</span><span id="st-dist" class="stat-val">--- NM</span></div>
                <div class="stat-row"><span class="stat-label">Destination</span><span id="st-dest" class="stat-val">---</span></div>
            </div>
        </div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzNPiunG2Hy0MRlB-WMCUE9Ua-_x3dRDdHD5D6j4ZeMJm4Mq1amW4POSSFcqWCu0lFSHg/exec";
    const AIRPORTS = { "DXB": [25.253, 55.365], "OMDB": [25.253, 55.365], "CKY": [9.577, -13.612], "DSS": [14.67, -17.07] };
    const WX_MAP = { 0:"☀️", 1:"🌤️", 2:"⛅", 3:"☁️", 45:"🌫️", 61:"🌧️", 95:"⛈️" };
    
    let map, marker, path;

    function initMap() {
        map = L.map('map', {zoomControl: false, attributionControl: false}).setView([25, 55], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        marker = L.marker([25, 55], {icon: L.divIcon({html:"<div style='font-size:24px; transform:rotate(0deg);'>✈️</div>", className:''})}).addTo(map);
        path = L.polyline([], {color: '#c1a35f', weight: 2}).addTo(map);
    }

    async function sync() {
        // 1. Weather
        try {
            const w = await (await fetch("https://api.open-meteo.com/v1/forecast?latitude=25.25&longitude=55.36&current_weather=true")).json();
            document.getElementById('main-temp').innerText = Math.round(w.current_weather.temperature) + "°";
            document.getElementById('main-w-icon').innerText = WX_MAP[w.current_weather.weathercode] || "☀️";
        } catch(e){}

        // 2. Flight
        try {
            const data = await (await fetch(GAS_URL)).json();
            if (data.hasFlight) {
                document.body.classList.add('flight-active');
                updateFlightLogic(data);
            } else {
                document.body.classList.remove('flight-active');
            }
        } catch(e){}
    }

    async function updateFlightLogic(data) {
        document.getElementById('hud-flight-id').innerText = data.title;
        let dep = new Date(data.departureTime);
        let pick = new Date(dep.getTime() - 135*60000);
        document.getElementById('hud-pickup').innerText = `PICKUP: ${pick.getHours()}:${pick.getMinutes().toString().padStart(2,'0')}`;
        document.getElementById('st-dest').innerText = data.destCode || "---";

        // Radar Search
        let rawNo = data.title.split('-')[0].replace(/\D/g, "");
        const callsigns = [("UAE"+rawNo).padEnd(8,' ')];
        if(rawNo.length === 4 && "843".includes(rawNo[0])) callsigns.push(("UAE"+rawNo.substring(1)).padEnd(8,' '));

        const radarRes = await (await fetch('https://opensky-network.org/api/states/all')).json();
        const s = radarRes.states.find(i => callsigns.includes(i[1]));

        if (s) {
            document.getElementById('hud-normal').style.display = "none";
            document.getElementById('hud-cruise').style.display = "block";
            const cur = [s[6], s[5]], gs = Math.round(s[9]*1.94), alt = Math.round(s[7]*3.28);
            
            // Progress
            const origin = AIRPORTS["DXB"], dest = AIRPORTS[data.destCode] || [0,0];
            const getD = (p1,p2) => {
                const R=3440, d2r=Math.PI/180;
                const a = Math.sin((p2[0]-p1[0])*d2r/2)**2 + Math.cos(p1[0]*d2r)*Math.cos(p2[0]*d2r)*Math.sin((p2[1]-p1[1])*d2r/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            };
            const total = getD(origin, dest), remain = getD(cur, dest);
            const prog = Math.min(100, Math.max(0, ((total-remain)/total)*100));

            document.getElementById('plane-icon').style.left = prog + "%";
            document.getElementById('st-gs').innerText = gs + " KT";
            document.getElementById('st-alt').innerText = "FL" + Math.round(alt/100);
            document.getElementById('st-dist').innerText = Math.round(remain) + " NM";
            
            marker.setLatLng(cur);
            path.addLatLng(cur);
            map.panTo(cur);
        }
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('main-clock').innerText = n.getHours().toString().padStart(2,'0')+":"+n.getMinutes().toString().padStart(2,'0');
        const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        document.getElementById('date-val').innerText = n.getDate() + " " + months[n.getMonth()];
        document.getElementById('day-val').innerText = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"][n.getDay()];
    }, 1000);

    initMap(); sync(); setInterval(sync, 40000);
</script>
</body>
</html>
