<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <title>Captain Cao's Flight HUD</title>
    <style>
        :root { --bg: #000; --gold: #c1a35f; --text: #fff; --gray: #222; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; transition: background 2s ease; }
        
        /* 1/4 顶部 HUD 动态区 */
        #top-hud { height: 25vh; border-bottom: 2px solid var(--gray); display: none; background: rgba(10,10,10,0.95); padding: 1.5vh 2vw; box-sizing: border-box; z-index: 100; position: relative; }
        .flight-active #top-hud { display: block; }

        /* 进度条系统 */
        .progress-line { width: 94%; height: 4px; background: #333; margin: 5vh auto; position: relative; }
        #plane-marker { position: absolute; top: -18px; left: 0%; font-size: 30px; transition: left 2s linear; text-shadow: 0 0 15px var(--gold); }
        .prog-mark { position: absolute; top: 30px; font-size: 1.6vh; color: #888; white-space: nowrap; font-family: monospace; }

        /* 3/4 主显示区 */
        #main-display { height: 100vh; display: flex; transition: height 0.5s ease; position: relative; }
        .flight-active #main-display { height: 75vh; }
        
        /* 左侧 2/3: 极巨化时钟 */
        #clock-zone { flex: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; border-right: 1px solid var(--gray); }
        #main-clock { font-size: 50vh; font-weight: 100; letter-spacing: -2vh; line-height: 0.9; }
        .flight-active #main-clock { font-size: 28vh; }

        /* 右侧 1/3: 实时地图与遥测 */
        #radar-sidebar { flex: 1; display: none; flex-direction: column; background: #050505; }
        .flight-active #radar-sidebar { display: flex; }
        #map-box { height: 60%; width: 100%; border-bottom: 1px solid var(--gray); }
        #telemetry { height: 40%; padding: 2vh; display: flex; flex-direction: column; justify-content: space-around; }

        /* 天气与日期组件 */
        .weather-corner { position: absolute; top: 3vh; right: 3vw; text-align: right; }
        .date-corner { position: absolute; top: 3vh; left: 4vw; }
        .w-icon { font-size: 10vh; margin-bottom: -1.5vh; }
        .w-temp { font-size: 6vh; color: var(--gold); font-weight: 200; }
        
        /* 参数行样式 */
        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 1vh 0; }
        .stat-label { color: #555; font-size: 1.4vh; text-transform: uppercase; }
        .stat-val { color: var(--gold); font-size: 2.6vh; font-weight: bold; font-family: monospace; }

        /* 自动风格变换 */
        .style-night { --bg: #000; filter: brightness(0.9); }
        .style-day { --bg: #0a0a0a; }
        .style-sunrise { --bg: linear-gradient(135deg, #1a0f05 0%, #000 100%); }
    </style>
</head>
<body class="style-night">

    <div id="top-hud">
        <div id="hud-info" style="display: grid; grid-template-columns: 1.2fr 1fr 1fr; height: 100%;">
            <div>
                <div style="font-size: 1.4vh; color: #555;">MISSION / PICKUP</div>
                <div id="hud-flight-id" style="font-size: 4vh; font-weight: bold; color: var(--gold);">--</div>
                <div id="hud-pickup" style="font-size: 2.2vh; color: #888;">--:--</div>
            </div>
            <div style="text-align: center;">
                <div id="hud-dest-icon" style="font-size: 5vh;">☀️</div>
                <div id="hud-dest-temp" style="font-size: 3vh; color: var(--gold);">--°C</div>
                <div id="hud-dest-name" style="font-size: 1.4vh; color: #555;">DESTINATION</div>
            </div>
            <div style="text-align: right;">
                <div style="font-size: 1.4vh; color: #555;">NOTAM / STATUS</div>
                <div id="hud-status" style="font-size: 2vh; color: #bbb;">READY</div>
                <div id="hud-notam-human" style="font-size: 1.6vh; color: #777; line-height: 1.3;">人话总结：跑道状况良好，目的地天气适宜，无运行危险。</div>
            </div>
        </div>
        
        <div id="hud-cruise" style="display:none; width: 100%;">
            <div class="progress-line">
                <div id="plane-marker">✈️</div>
                <div id="info-left" class="prog-mark" style="left:0;">DEP: --:--</div>
                <div id="info-right" class="prog-mark" style="right:0; text-align:right;">ARR: --:--</div>
            </div>
        </div>
    </div>

    <div id="main-display">
        <div id="clock-zone">
            <div class="date-corner">
                <div id="date-val" style="font-size: 4.5vh;">-- ---</div>
                <div id="day-val" style="font-size: 2.5vh; color: var(--gold);">--------</div>
            </div>
            <div class="weather-corner">
                <div id="main-w-icon" class="w-icon">☀️</div>
                <div id="main-temp" class="w-temp">--°</div>
            </div>
            <div id="main-clock">00:00</div>
        </div>

        <div id="radar-sidebar">
            <div id="map-box"><div id="map" style="width:100%; height:100%;"></div></div>
            <div id="telemetry">
                <div class="stat-row"><span class="stat-label">Ground Speed</span><span id="st-gs" class="stat-val">--- KT</span></div>
                <div class="stat-row"><span class="stat-label">Altitude</span><span id="st-alt" class="stat-val">FL ---</span></div>
                <div class="stat-row"><span class="stat-label">Distance</span><span id="st-dist" class="stat-val">--- NM</span></div>
                <div class="stat-row"><span class="stat-label">Destination</span><span id="st-dest" class="stat-val">---</span></div>
            </div>
        </div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 您的新部署 URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxJ9BARIJhAraHdd-nCnumx583NWrNFHN20ufiYSnRiWwb-vJPNnW4IwutNhtKx15P_/exec";
    const AIRPORTS = { "DXB": [25.253, 55.365], "CKY": [9.577, -13.612], "DSS": [14.672, -17.073], "PEK": [40.07, 116.59] };
    const WX_MAP = { 0:"☀️", 1:"🌤️", 2:"⛅", 3:"☁️", 45:"🌫️", 61:"🌧️", 95:"⛈️" };

    let map, marker, trackLine;

    function initMap() {
        map = L.map('map', {zoomControl: false, attributionControl: false}).setView([25, 55], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        marker = L.marker([25, 55], {icon: L.divIcon({html:"<div id='p-icon' style='font-size:24px; transition:0.5s;'>✈️</div>", className:''})}).addTo(map);
        trackLine = L.polyline([], {color: '#c1a35f', weight: 2}).addTo(map);
    }

    async function sync() {
        // 1. 本地天气
        try {
            const wRes = await fetch("https://api.open-meteo.com/v1/forecast?latitude=25.25&longitude=55.36&current_weather=true");
            const wData = await wRes.json();
            document.getElementById('main-temp').innerText = Math.round(wData.current_weather.temperature) + "°";
            document.getElementById('main-w-icon').innerText = WX_MAP[wData.current_weather.weathercode] || "☀️";
            updateStyle(wData.current_weather.weathercode);
        } catch(e){}

        // 2. 航班动态 (读取您的 GAS URL)
        try {
            const fRes = await fetch(GAS_URL);
            const fData = await fRes.json();
            if (fData.hasFlight) {
                document.body.classList.add('flight-active');
                processFlight(fData);
            } else {
                document.body.classList.remove('flight-active');
            }
        } catch(e){}
    }

    function processFlight(data) {
        document.getElementById('hud-flight-id').innerText = data.title;
        let dep = new Date(data.departureTime);
        let pick = new Date(dep.getTime() - 135 * 60000); // 提前 2:15
        document.getElementById('hud-pickup').innerText = `PICKUP: ${pick.getHours().toString().padStart(2,'0')}:${pick.getMinutes().toString().padStart(2,'0')}`;
        document.getElementById('st-dest').innerText = data.destCode;
        document.getElementById('hud-dest-name').innerText = data.destCode;

        // 搜索 OpenSky 雷达 (适配货机回退逻辑)
        let rawNo = data.title.split('-')[0].replace(/\D/g, "");
        const callsigns = [("UAE"+rawNo).padEnd(8,' ')];
        if(rawNo.length === 4 && "843".includes(rawNo[0])) callsigns.push(("UAE"+rawNo.substring(1)).padEnd(8,' '));
        
        fetchRadar(callsigns, data);
    }

    async function fetchRadar(callsigns, flightData) {
        try {
            const res = await fetch('https://opensky-network.org/api/states/all');
            const data = await res.json();
            const s = data.states.find(i => callsigns.includes(i[1]));

            if (s) {
                document.getElementById('hud-info').style.display = "none";
                document.getElementById('hud-cruise').style.display = "block";
                updateFlightTelemetry(s, flightData);
            } else {
                document.getElementById('hud-info').style.display = "grid";
                document.getElementById('hud-cruise').style.display = "none";
            }
        } catch(e){}
    }

    function updateFlightTelemetry(s, flight) {
        const cur = [s[6], s[5]], gs = Math.round(s[9]*1.94), alt = Math.round(s[7]*3.28);
        document.getElementById('st-gs').innerText = gs + " KT";
        document.getElementById('st-alt').innerText = "FL" + Math.round(alt/100);
        
        // 距离与进度
        const origin = AIRPORTS[flight.originCode] || AIRPORTS["DXB"];
        const dest = AIRPORTS[flight.destCode] || [0,0];
        const dist = (p1, p2) => {
            const R=3440, d2r=Math.PI/180;
            const a = Math.sin((p2[0]-p1[0])*d2r/2)**2 + Math.cos(p1[0]*d2r)*Math.cos(p2[0]*d2r)*Math.sin((p2[1]-p1[1])*d2r/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };
        const total = dist(origin, dest), remain = dist(cur, dest);
        const prog = Math.min(100, Math.max(0, ((total-remain)/total)*100));

        document.getElementById('plane-marker').style.left = prog + "%";
        document.getElementById('st-dist').innerText = Math.round(remain) + " NM";
        document.getElementById('info-left').innerText = `已飞: ${Math.round(total-remain)} NM`;
        document.getElementById('info-right').innerText = `预计剩余: ${Math.round(remain)} NM`;

        // 地图更新
        marker.setLatLng(cur);
        trackLine.addLatLng(cur);
        map.panTo(cur);
        document.getElementById('p-icon').style.transform = `rotate(${s[10] || 0}deg)`;
    }

    function updateStyle(code) {
        const h = new Date().getHours();
        const b = document.body; b.className = "";
        if (h < 6 || h > 19) b.classList.add('style-night');
        else if (h >= 6 && h < 8) b.classList.add('style-sunrise');
        else b.classList.add('style-day');
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('main-clock').innerText = n.getHours().toString().padStart(2,'0')+":"+n.getMinutes().toString().padStart(2,'0');
        const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        document.getElementById('date-val').innerText = n.getDate() + " " + months[n.getMonth()];
        document.getElementById('day-val').innerText = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"][n.getDay()];
    }, 1000);

    initMap(); sync(); setInterval(sync, 40000);
</script>
</body>
</html>
