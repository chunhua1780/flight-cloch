<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>777 Captain HUD - Multi-Leg Pro</title>
    <style>
        :root { --bg: #000; --gold: #c1a35f; --text: #fff; --gray: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: "SF Pro Display", sans-serif; overflow: hidden; height: 100vh; }
        
        /* 顶部 1/4 HUD */
        #hud-top { height: 25vh; border-bottom: 2px solid var(--gray); display: none; padding: 1.5vh 2vw; background: #080808; box-sizing: border-box; }
        .has-flight #hud-top { display: grid; grid-template-columns: 1.2fr 1fr 1.2fr; gap: 20px; }

        /* 底部 3/4 主区 */
        #main-display { height: 100vh; display: flex; transition: height 0.4s; }
        .has-flight #main-display { height: 75vh; }
        .in-flight #main-display { display: grid; grid-template-columns: 1fr 1fr; }

        /* 极致大时钟 */
        #clock-zone { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        #main-clock { font-size: 48vh; font-weight: 100; letter-spacing: -2vh; line-height: 1; }
        .has-flight #main-clock { font-size: 26vh; }

        /* 天气与信息 */
        .hud-label { font-size: 1.6vh; color: #555; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
        .hud-val { font-size: 3.8vh; font-weight: bold; color: var(--gold); }
        .hud-sub { font-size: 2vh; color: #888; }
        
        /* 进度条 */
        #flight-progress { grid-column: span 3; height: 4px; background: #222; position: relative; margin-top: 15px; }
        #plane-mark { position: absolute; top: -15px; left: 0%; font-size: 24px; transition: left 2s linear; }

        .corner { position: absolute; padding: 25px; z-index: 5; }
        .weather-huge { font-size: 8vh; font-weight: 200; color: var(--gold); }
    </style>
</head>
<body>

    <div id="hud-top">
        <div class="hud-cell">
            <div class="hud-label">Flight Mission</div>
            <div id="mission-id" class="hud-val">EK --</div>
            <div id="route-info" class="hud-sub">-- ➔ --</div>
            <div id="pickup-time" style="color: #fff; font-size: 2.4vh; margin-top: 8px; font-weight: bold;">PICKUP: --:--</div>
        </div>
        <div class="hud-cell" style="text-align: center; border-left: 1px solid #222; border-right: 1px solid #222;">
            <div class="hud-label">Dest Weather</div>
            <div id="dest-w-icon" style="font-size: 5vh;">☀️</div>
            <div id="dest-w-temp" class="hud-val">--°C</div>
            <div id="clothing-index" class="hud-sub">--</div>
        </div>
        <div class="hud-cell" style="text-align: right;">
            <div class="hud-label">Operational NOTAM</div>
            <div id="notam-brief" style="font-size: 1.8vh; color: #aaa; line-height: 1.4;">Ready for briefing...</div>
            <div id="stopover-info" style="font-size: 1.6vh; color: var(--gold); margin-top: 5px;"></div>
        </div>
        <div id="flight-progress">
            <div id="plane-mark">✈️</div>
        </div>
    </div>

    <div id="main-display">
        <div id="clock-zone">
            <div class="corner" style="top:0; left:0;">
                <div id="date-val" style="font-size: 4vh;">-- ---</div>
                <div id="day-val" style="font-size: 2vh; color: var(--gold);">--------</div>
            </div>
            <div class="corner" style="top:0; right:0; text-align:right;">
                <div id="dxb-w-icon" style="font-size: 6vh;">☀️</div>
                <div id="dxb-temp" class="weather-huge">--°</div>
            </div>
            <div id="main-clock">00:00</div>
            <div id="local-status" style="font-size: 2vh; color: #444; margin-top: -2vh;">DUBAI TIME (GST)</div>
        </div>

        <div id="dynamic-panel" style="display: none; border-left: 1px solid #1a1a1a; background: #050505;">
            <div style="padding: 40px; text-align: center;">
                <div id="dyn-city" class="hud-label" style="font-size: 3vh;">STATION</div>
                <div id="dyn-w-icon" style="font-size: 8vh; margin: 20px 0;">--</div>
                <div id="dyn-temp" class="weather-huge" style="font-size: 10vh;">--°</div>
                <div id="dyn-time" style="font-size: 4vh; color: #888; margin-top: 20px;">--:--</div>
            </div>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxSmqqVM38ZuCrrzwcm1E7179zwvAi5qjhEzaq4mXhwCOeczDP8CB2Nx7hw7zAFcqWU/exec";
    const AIRPORT_DB = {
        "CKY": { name: "Conakry", lat: 9.57, lon: -13.61, city: "Conakry" },
        "DSS": { name: "Dakar", lat: 14.67, lon: -17.07, city: "Dakar" },
        "DXB": { name: "Dubai", lat: 25.25, lon: 55.36, city: "Dubai" }
    };

    function cleanFlightNo(raw) {
        let num = raw.toString().replace(/\D/g, "");
        // 逻辑：如果是8/4开头的4位数，优先尝试原号，若非货机则去掉首位
        if (num.length === 4 && (num.startsWith('8') || num.startsWith('4'))) {
            return num.substring(1); 
        }
        return num;
    }

    async function update() {
        const now = new Date();
        document.getElementById('main-clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        
        const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
        document.getElementById('date-val').innerText = now.getDate() + " " + months[now.getMonth()];
        document.getElementById('day-val').innerText = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"][now.getDay()];

        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();

            if (data.hasFlight) {
                document.body.classList.add('has-flight');
                
                // 1. 智能航班号显示 (剥离多余的8)
                const displayNo = cleanFlightNo(data.flightNo);
                document.getElementById('mission-id').innerText = "EK " + displayNo;
                document.getElementById('route-info').innerText = `${data.origin} ➔ ${data.dest}`;
                
                // 2. Pickup 时间 (严格同步日历开始时间 - 135min)
                const std = new Date(data.std);
                const pick = new Date(std.getTime() - 135 * 60000);
                document.getElementById('pickup-time').innerText = `PICKUP: ${pick.getHours().toString().padStart(2,'0')}:${pick.getMinutes().toString().padStart(2,'0')}`;

                // 3. 经停与目的地天气
                const destCode = data.dest;
                const destInfo = AIRPORT_DB[destCode] || { lat: 25, lon: 55, name: destCode };
                const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${destInfo.lat}&longitude=${destInfo.lon}&current_weather=true`);
                const wData = await wRes.json();
                const temp = Math.round(wData.current_weather.temperature);
                
                document.getElementById('dest-w-temp').innerText = temp + "°C";
                document.getElementById('dest-w-icon').innerText = wData.current_weather.weathercode < 3 ? "☀️" : "⛅";
                document.getElementById('clothing-index').innerText = temp > 25 ? "Shirts / Tropical" : "Casual / Light Layer";

                // 4. NOTAM / 运行预警
                document.getElementById('notam-brief').innerText = temp > 35 ? "PERF: HIGH TEMP LIMITS POSSIBLE" : "WX: STABLE / NO SIGNIFICANT HAZARDS";

                // 5. 动态显示逻辑
                const diffHours = (std - now) / 3600000;
                if (diffHours < 0.5 && diffHours > -12) { // 推出、滑行或飞行中
                    document.body.classList.add('in-flight');
                    document.getElementById('dynamic-panel').style.display = "flex";
                    document.getElementById('dyn-city').innerText = destInfo.name;
                    document.getElementById('dyn-temp').innerText = temp + "°";
                }
            } else {
                document.body.classList.remove('has-flight', 'in-flight');
                document.getElementById('dynamic-panel').style.display = "none";
            }

            // 6. 迪拜天气
            const dxbW = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=25.25&longitude=55.36&current_weather=true`);
            const dxbD = await dxbW.json();
            document.getElementById('dxb-temp').innerText = Math.round(dxbD.current_weather.temperature) + "°";
        } catch(e) { console.log("Refresh Error"); }
    }

    setInterval(update, 30000);
    update();
</script>
</body>
</html>
