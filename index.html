<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flight Wall</title>

<style>

/* ===================== BASE ===================== */
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  overflow:hidden;
}

/* ===================== TOP FLIGHT PANEL ===================== */
#top{
  height:25%;
  padding:24px;
  box-sizing:border-box;
  background:linear-gradient(180deg,#111,#000);
  border-bottom:1px solid #222;
  font-size:24px;
  font-weight:300;
  line-height:1.6;
}

/* 高亮文字 */
.highlight{
  color:#00ffd5;
  font-weight:500;
}
.warn{
  color:#ffcc00;
}

/* ===================== CLOCK AREA ===================== */
#clocks{
  height:75%;
  display:flex;
}

/* 每个时钟 */
.clockBox{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#000;
}

/* 大时钟 */
.clock{
  font-size:150px;
  font-weight:100;
  letter-spacing:2px;
  color:#fff;
  opacity:0.92;
}

/* 标签 */
.label{
  margin-top:10px;
  font-size:14px;
  color:#666;
  letter-spacing:2px;
}

/* ===================== SMALL WEATHER ===================== */
#weather{
  position:absolute;
  top:12px;
  right:16px;
  font-size:14px;
  color:#aaa;
}

</style>
</head>

<body>

<div id="weather">Loading weather...</div>

<div id="top">Loading flight data...</div>

<div id="clocks">

  <div class="clockBox">
    <div class="clock" id="clock1">--:--</div>
    <div class="label">LOCAL TIME</div>
  </div>

  <div class="clockBox">
    <div class="clock" id="clock2">--:--</div>
    <div class="label">DEST TIME</div>
  </div>

</div>

<script>

// ================= CLOCK =================
function updateClock(){
  const now = new Date();

  document.getElementById("clock1").innerText =
    now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});

  // 模拟目的地时间（+3小时）
  const dest = new Date(now.getTime() + 3*3600000);

  document.getElementById("clock2").innerText =
    dest.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}

// ================= LOAD FLIGHT DATA =================
async function loadData(){

  const url = "https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/data.json";

  try{
    const res = await fetch(url);
    const data = await res.json();

    document.getElementById("top").innerHTML = `
      ✈ <span class="highlight">${data.airline} ${data.flight_number}</span><br>
      ${data.from.iata} → ${data.to.iata}<br>
      Departure: ${data.schedule.departure_time} | Arrival: ${data.schedule.arrival_time}<br>
      Status: <span class="warn">${data.status}</span><br>
      Phase: ${data.flight_state.phase}
    `;

    document.getElementById("weather").innerText =
      `🌤 ${data.from.iata} ${data.weather_hint.origin_temp}° | ${data.to.iata} ${data.weather_hint.destination_temp}°`;

  }catch(e){
    document.getElementById("top").innerHTML =
      "⚠ Failed to load flight data";
  }
}

// ================= LOOP =================
setInterval(updateClock,1000);
updateClock();
loadData();

</script>

</body>
</html>
