<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V29 Cockpit UI Engine</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system;
overflow:hidden;
}

/* ================= CANVAS ================= */
#canvas{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
}

/* ================= LEFT TOOLBAR (Photoshop style) ================= */
#toolbar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#0f0f0f;
border-right:1px solid #222;
padding:10px;
overflow:auto;
z-index:9999;
}

.tool{
background:#1a1a1a;
margin:6px 0;
padding:8px;
cursor:pointer;
border:1px solid #333;
}

input,select{
width:100%;
margin:4px 0;
background:#000;
color:#fff;
border:1px solid #333;
}

/* ================= NODE ================= */
.node{
position:absolute;
padding:6px;
cursor:move;
user-select:none;
border:1px dashed transparent;
}

.edit .node{
border:1px dashed #555;
}

/* resize handle */
.node::after{
content:"";
position:absolute;
right:0;
bottom:0;
width:10px;
height:10px;
background:#c1a35f;
display:none;
cursor:nwse-resize;
}

.edit .node::after{
display:block;
}

/* ================= MAIN AREA OFFSET ================= */
#canvas{
left:220px;
width:calc(100% - 220px);
}

/* ================= FLOAT UI ================= */
#menu{
position:fixed;
bottom:20px;
right:20px;
background:#c1a35f;
color:#000;
padding:10px;
border-radius:50%;
z-index:10000;
}

</style>
</head>

<body>

<!-- TOOLBAR -->
<div id="toolbar">

<div style="color:#c1a35f;">ADD ELEMENT</div>

<div class="tool" onclick="addNode('time')">Time</div>
<div class="tool" onclick="addNode('date')">Date</div>
<div class="tool" onclick="addNode('city')">City</div>
<div class="tool" onclick="addNode('airport')">Airport</div>
<div class="tool" onclick="addNode('flight')">Flight</div>

<hr>

<div style="color:#c1a35f;">STYLE</div>

<input type="color" onchange="setColor(this.value)">
<input type="range" min="10" max="100" onchange="setSize(this.value)">

<hr>

<div style="color:#c1a35f;">LAYOUT</div>

<button onclick="toggleEdit()">Edit Mode</button>

</div>

<!-- CANVAS -->
<div id="canvas"></div>

<!-- FLOAT MENU -->
<div id="menu">✈</div>

<script>

/* ================= STATE ================= */
let edit=false;
let selected=null;

/* ================= EDIT MODE ================= */
function toggleEdit(){
edit=!edit;
document.body.classList.toggle("edit");
}

/* ================= ADD NODE ================= */
function addNode(type){

let el=document.createElement("div");

el.className="node";
el.dataset.type=type;

/* SMART BINDING (核心联动逻辑) */
if(type==="date"){
el.innerText=new Date().toDateString();
}

if(type==="time"){
el.innerText="00:00";
setInterval(()=>{

const now=new Date();
el.innerText=
new Intl.DateTimeFormat("en-GB",{
timeZone:"Asia/Dubai",
hour:"2-digit",
minute:"2-digit"
}).format(now);

},1000);
}

if(type==="city") el.innerText="Dubai";
if(type==="airport") el.innerText="DXB";
if(type==="flight") el.innerText="EK---";

/* DRAG */
drag(el);

/* CLICK SELECT */
el.onclick=()=>selected=el;

canvas.appendChild(el);

}

/* ================= DRAG ENGINE ================= */
function drag(el){

let ox,oy;

el.onmousedown=(e)=>{

if(!edit) return;

ox=e.offsetX;
oy=e.offsetY;

document.onmousemove=(e)=>{

el.style.left=(e.pageX-ox-220)+"px";
el.style.top=(e.pageY-oy)+"px";

};

document.onmouseup=()=>document.onmousemove=null;

};

}

/* ================= STYLE CONTROL ================= */
function setColor(c){
if(selected) selected.style.color=c;
}

function setSize(v){
if(selected) selected.style.fontSize=v+"px";
}

/* ================= SMART LINK SYSTEM ================= */
function autoLink(el){

let type=el.dataset.type;

if(type==="airport"){
// future: DSS → Dakar → Senegal → weather
}

if(type==="date"){
// future: auto timezone bind
}

}

</script>

</body>
</html>
