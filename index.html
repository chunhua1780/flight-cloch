<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V27 Cockpit Engine</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system;
overflow:hidden;
}

/* ================= EDIT MODE ================= */
.edit .node{
outline:1px dashed #555;
cursor:move;
}

/* ================= NODE SYSTEM ================= */
.node{
position:absolute;
user-select:none;
}

/* drag + resize handle */
.node::after{
content:"";
position:absolute;
right:0;
bottom:0;
width:12px;
height:12px;
background:#c1a35f;
cursor:nwse-resize;
display:none;
}

.edit .node::after{
display:block;
}

/* ================= CLOCK ================= */
#clock{
font-size:28vh;
text-align:center;
font-weight:800;
}

/* ================= DATE ================= */
#date{
font-size:3vh;
color:#aaa;
text-align:center;
}

/* ================= WEATHER ================= */
#weather{
top:20px;
right:20px;
text-align:right;
}

/* ================= LAYOUT ================= */
body.single #left, body.single #right, body.single #topbar{display:none;}

body.dual #left, body.dual #right{display:none;}

body.triple #topbar{display:block;}
body.triple #left, body.triple #right{display:block;}

/* ================= PANELS ================= */
#panel{
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
background:#111;
padding:15px;
width:320px;
display:none;
z-index:9999;
}

button{
width:100%;
margin:4px 0;
padding:8px;
background:#222;
color:#fff;
border:1px solid #444;
}

/* ================= TRIPLE AREA ================= */
#topbar{
position:absolute;
top:0;
left:0;
width:100%;
height:12vh;
background:#111;
display:none;
}

#left,#right{
position:absolute;
top:12vh;
bottom:0;
width:50%;
}

#left{left:0;background:#050505;}
#right{right:0;background:#080808;}

</style>
</head>

<body class="single">

<!-- CORE -->
<div id="clock" class="node">00:00</div>
<div id="date" class="node">---</div>

<!-- WEATHER -->
<div id="weather" class="node">
<div>☀️</div>
<div>28°</div>
</div>

<!-- TRIPLE MODE -->
<div id="topbar">FLIGHT STATUS BAR</div>
<div id="left">DXB WEATHER + DATE</div>
<div id="right">DEST WEATHER + DATE</div>

<!-- BUTTON -->
<button onclick="toggleEdit()" style="position:fixed;top:10px;right:10px;z-index:9999;">
EDIT
</button>

<button onclick="setLayout('single')" style="position:fixed;bottom:20px;right:20px;">S</button>
<button onclick="setLayout('dual')" style="position:fixed;bottom:60px;right:20px;">D</button>
<button onclick="setLayout('triple')" style="position:fixed;bottom:100px;right:20px;">T</button>

<script>

/* ================= EDIT MODE ================= */
function toggleEdit(){
document.body.classList.toggle("edit");
}

/* ================= LAYOUT ================= */
function setLayout(l){
document.body.className=l;
}

/* ================= DRAG + RESIZE ENGINE ================= */
let activeNode=null;
let resizeMode=false;

document.querySelectorAll(".node").forEach(node=>{

let ox,oy;

node.onmousedown=(e)=>{

if(document.body.classList.contains("edit")==false) return;

if(e.offsetX > node.clientWidth-12 && e.offsetY > node.clientHeight-12){
resizeMode=true;
activeNode=node;
return;
}

ox=e.offsetX;
oy=e.offsetY;

activeNode=node;

document.onmousemove=(e)=>{

if(!resizeMode){
node.style.left=(e.pageX-ox)+"px";
node.style.top=(e.pageY-oy)+"px";
}

};

document.onmouseup=()=>{

document.onmousemove=null;
resizeMode=false;

};

};

});

/* ================= CLOCK (FIXED DUBAI) ================= */
function clock(){

const now=new Date();

document.getElementById("clock").innerText=
new Intl.DateTimeFormat("en-GB",{
timeZone:"Asia/Dubai",
hour:"2-digit",
minute:"2-digit",
hour12:false
}).format(now);

document.getElementById("date").innerText=
new Intl.DateTimeFormat("en-GB",{
timeZone:"Asia/Dubai",
weekday:"long",
year:"numeric",
month:"short",
day:"numeric"
}).format(now);

}

setInterval(clock,1000);
clock();

</script>

</body>
</html>
