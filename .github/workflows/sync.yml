name: Sync Flights

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install libs
        run: pip install requests ics

      - name: Run script
        run: |
          python - <<EOF
          import requests
          from ics import Calendar
          import json

          url = "https://p206-caldav.icloud.com/published/2/%0AMTkyMTc5MzcwNDYxOTIxN_ayvhztknFLls9NRXK_Mcke3hK6muYeh4YJdh%0AKYgJ7n%D0%9CpsCc%D0%90K7gHleg-%D0%A0%7C9GjleyzhYkhd%7C9mcew%7CQF%D0%95gP%D1%85%D0%9Do"

          data = requests.get(url).text
          cal = Calendar(data)

          flights = []

          for e in cal.events:
              flights.append({
                  "title": str(e.name),
                  "start": str(e.begin),
                  "end": str(e.end)
              })

          with open("flights.json", "w") as f:
              json.dump(flights, f, indent=2)
          EOF

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add flights.json
          git commit -m "update" || echo "no change"
          git push
