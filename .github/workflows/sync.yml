name: Sync Calendar to Flights JSON

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install requests ics

      - name: Parse Flight Data
        run: |
          python - <<EOF
          import requests
          from ics import Calendar
          import json
          import re

          raw_url = """http://p206-caldav.icloud.com/published/2/%0AMTkyMTc5MzcwNDYxOTIxN_ayvhztknFLls9NRXK_Mcke3hK6muYeh4YJdh%0AKYgJ7n%D0%9CpsCc%D0%90K7gHleg-%D0%A0%7C9GjleyzhYkhd%7C9mcew%7CQF%D0%95gP%D1%85%D0%9Do"""
          url = raw_url.replace("%0A","").replace("http://","https://")

          text = requests.get(url).text
          cal = Calendar(text)

          flights = []

          for e in cal.events:
              title = str(e.name)

              # 🔍 提取机场代码（3字）
              codes = re.findall(r"[A-Z]{3}", title)

              if len(codes) >= 2:
                  dep = codes[0]
                  arr = codes[1]
              else:
                  dep = "UNK"
                  arr = "UNK"

              flights.append({
                  "from": dep,
                  "to": arr,
                  "departure": str(e.begin),
                  "arrival": str(e.end),
                  "raw": title
              })

          with open("flights.json", "w") as f:
              json.dump({"flights": flights}, f, indent=2)

          print("Flights parsed:", len(flights))
          EOF

      - run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add flights.json
          git commit -m "update flights" || echo "no change"
          git push
