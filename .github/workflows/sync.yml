name: Sync Flights

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install libs
        run: pip install requests ics

      - name: Run script
        run: |
          python - <<EOF
          import requests
          from ics import Calendar
          import json

          url = "你的ICS链接"

          data = requests.get(url).text
          cal = Calendar(data)

          flights = []

          for e in cal.events:
              flights.append({
                  "title": str(e.name),
                  "start": str(e.begin),
                  "end": str(e.end)
              })

          with open("flights.json", "w") as f:
              json.dump(flights, f, indent=2)
          EOF

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add flights.json
          git commit -m "update" || echo "no change"
          git push
