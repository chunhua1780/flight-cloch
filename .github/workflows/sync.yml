name: Sync Calendar to Flights JSON

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install libs
        run: pip install requests ics

      - name: Convert calendar to JSON
        run: |
          python - <<EOF
          import requests
          from ics import Calendar
          import json

          url = "YOUR_ICS_LINK_HERE"

          text = requests.get(url).text
          cal = Calendar(text)

          flights = []

          for e in cal.events:
              flights.append({
                  "title": e.name,
                  "start": str(e.begin),
                  "end": str(e.end),
                  "description": e.description
              })

          with open("flights.json", "w") as f:
              json.dump({"flights": flights}, f, indent=2)
          EOF

      - name: Commit update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add flights.json
          git commit -m "auto sync flights" || echo "no changes"
          git push
