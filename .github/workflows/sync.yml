name: Sync Calendar to Flights JSON

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install libs
        run: pip install requests ics

      - name: Convert calendar to JSON (SAFE VERSION)
        run: |
          python - <<EOF
          import requests
          from ics import Calendar
          import json

          url = "https://p206-caldav.icloud.com/published/2/XXXXXXXXXXXX.ics"

          print("Fetching:", url)

          r = requests.get(url, timeout=20)

          print("STATUS:", r.status_code)

          if r.status_code != 200:
              raise Exception("❌ Failed to fetch calendar")

          text = r.text

          # 🚨 关键：验证是不是 ICS
          if "BEGIN:VCALENDAR" not in text:
              print("RAW SAMPLE:")
              print(text[:300])
              raise Exception("❌ Not a valid ICS file")

          cal = Calendar(text)

          flights = []

          for e in cal.events:
              flights.append({
                  "title": e.name,
                  "start": str(e.begin),
                  "end": str(e.end),
                  "description": getattr(e, "description", "")
              })

          # 🚨 防止空数据写入
          if len(flights) == 0:
              raise Exception("❌ No flights found in calendar")

          with open("flights.json", "w") as f:
              json.dump({"flights": flights}, f, indent=2)

          print("✅ Flights parsed:", len(flights))
          EOF

      - name: Commit update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add flights.json
          git commit -m "auto sync flights" || echo "no changes"
          git push
